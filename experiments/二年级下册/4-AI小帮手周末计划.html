<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI 小帮手 — 周末出行小问答</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:"华文圆体","PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:#3d2914}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 8% 12%, #fff7a8 0 80px, transparent 80px),
      radial-gradient(circle at 92% 8%, #ffd6e7 0 60px, transparent 60px),
      radial-gradient(ellipse 120px 70px at 18% 20%, #fff 0 70%, transparent 70%),
      radial-gradient(ellipse 90px 50px at 80% 26%, #fff 0 70%, transparent 70%),
      radial-gradient(ellipse 100px 55px at 55% 14%, #fff 0 70%, transparent 70%),
      linear-gradient(180deg, #c2e9ff 0%, #fff5e0 60%, #d4f7d6 100%);
    padding:20px 16px 100px;
    position:relative;
    overflow-x:hidden;
  }

  /* Floating decorations */
  body::before, body::after{
    content:'';position:fixed;pointer-events:none;z-index:0;
  }
  .deco{position:fixed;font-size:38px;opacity:.7;pointer-events:none;z-index:0;animation:float 6s ease-in-out infinite}
  .deco.d1{top:14%;left:4%;animation-delay:0s}
  .deco.d2{top:28%;right:5%;animation-delay:1.2s;font-size:32px}
  .deco.d3{top:52%;left:3%;animation-delay:2.4s}
  .deco.d4{bottom:18%;right:4%;animation-delay:3.5s;font-size:36px}
  .deco.d5{bottom:32%;left:6%;animation-delay:1.8s;font-size:30px}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(4deg)}}

  .wrap{max-width:920px;margin:0 auto;position:relative;z-index:1}

  /* Hero */
  .hero{
    background:linear-gradient(135deg,#ff8a4c 0%,#ff5e7e 60%,#a855f7 100%);
    color:#fff;border-radius:22px;padding:24px 28px 28px;
    box-shadow:0 8px 20px rgba(255,94,126,.3);
    margin-bottom:22px;display:flex;align-items:center;gap:18px;position:relative;
    border:2px solid #fff;
  }
  .mascot{
    width:108px;height:108px;background:linear-gradient(180deg,#ffd89b,#ff9a44);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:74px;flex-shrink:0;border:2px solid #fff;
    box-shadow:0 8px 20px rgba(0,0,0,.18);
    animation:bounce 2.4s ease-in-out infinite;position:relative;
  }
  .mascot::after{
    content:'你好呀！';position:absolute;top:-12px;right:-72px;
    background:#fff;color:#ff5e7e;padding:5px 12px;border-radius:14px;
    font-size:15px;font-weight:800;border:1.5px solid #ff5e7e;
    white-space:nowrap;animation:pop 3s ease infinite;
  }
  .mascot::before{
    content:'';position:absolute;top:0;right:-20px;width:14px;height:14px;
    background:#fff;border-left:3px solid #ff5e7e;border-bottom:3px solid #ff5e7e;
    transform:rotate(45deg);animation:pop 3s ease infinite;
  }
  @keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(4deg)}}
  @keyframes pop{0%,80%,100%{opacity:1;transform:scale(1)}40%{opacity:1;transform:scale(1.08)}90%{opacity:0;transform:scale(.95)}}
  .hero-text{flex:1;min-width:0}
  .hero h1{font-size:30px;font-weight:900;letter-spacing:1px;text-shadow:0 3px 0 rgba(0,0,0,.12);line-height:1.2}
  .hero-sub{font-size:16px;margin-top:8px;opacity:.96;line-height:1.5;font-weight:600}
  .hero-badge{
    position:absolute;top:14px;right:18px;background:#fff;color:#ff5e7e;
    padding:6px 14px;border-radius:999px;font-size:14px;font-weight:800;
    border:1.5px solid #fde68a;transform:rotate(6deg);
  }

  /* Stamp progress */
  .stamps{
    background:#fff;border-radius:24px;padding:14px 20px;margin-bottom:18px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    box-shadow:0 4px 12px rgba(0,0,0,.06);border:2px solid #fed7aa;
  }
  .stamps-label{font-weight:900;color:#9a3412;font-size:14px;display:flex;align-items:center;gap:6px}
  .stamps-row{display:flex;gap:10px}
  .stamp{
    width:54px;height:54px;border-radius:14px;background:#fef3c7;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1.5px dashed #fbbf24;color:#9a3412;font-size:22px;
    transition:.4s cubic-bezier(.34,1.56,.64,1);position:relative;
  }
  .stamp .lab{font-size:12px;font-weight:900;margin-top:1px}
  .stamp.got{
    background:linear-gradient(135deg,#fb923c,#ef4444);color:#fff;
    border:1.5px solid #fff;box-shadow:0 0 0 2px #fb923c, 0 6px 14px rgba(239,68,68,.4);
    transform:rotate(-8deg) scale(1.05);
  }
  .stamp.got::after{
    content:'✓';position:absolute;top:-8px;right:-8px;width:22px;height:22px;
    background:#10b981;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:900;border:2px solid #fff;
  }

  /* Cards */
  .card{
    background:#fff;border-radius:18px;padding:22px;margin-bottom:18px;
    box-shadow:0 6px 16px rgba(0,0,0,.07);
    border:2px solid #fff;position:relative;
  }
  .step-title{
    font-size:22px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:10px;color:#7c2d12;
  }
  .step-num{
    width:38px;height:38px;background:linear-gradient(135deg,#fbbf24,#ef4444);color:#fff;
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:900;flex-shrink:0;border:1.5px solid #fff;
    box-shadow:0 4px 10px rgba(239,68,68,.3);
  }

  /* Destination cards (sticker style) */
  .dests{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:680px){.dests{grid-template-columns:repeat(2,1fr)}}
  .dest{
    padding:18px 10px;border-radius:24px;cursor:pointer;text-align:center;
    transition:.25s cubic-bezier(.34,1.56,.64,1);border:2px solid transparent;
    position:relative;font-weight:900;font-size:18px;color:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.12);
  }
  .dest:hover{transform:translateY(-4px) rotate(-2deg)}
  .dest.on{transform:scale(1.06) rotate(-3deg);border-color:#fff;box-shadow:0 0 0 2px #fbbf24, 0 12px 24px rgba(0,0,0,.2)}
  .dest .emo{font-size:54px;display:block;margin-bottom:4px;filter:drop-shadow(0 3px 0 rgba(0,0,0,.15));animation:wiggle 3s ease-in-out infinite}
  .dest:nth-child(1){background:linear-gradient(135deg,#86efac,#22c55e)}
  .dest:nth-child(2){background:linear-gradient(135deg,#a78bfa,#7c3aed)}
  .dest:nth-child(3){background:linear-gradient(135deg,#67e8f9,#0891b2)}
  .dest:nth-child(4){background:linear-gradient(135deg,#fda4af,#e11d48)}
  .dest:nth-child(1) .emo{animation-delay:0s}
  .dest:nth-child(2) .emo{animation-delay:.4s}
  .dest:nth-child(3) .emo{animation-delay:.8s}
  .dest:nth-child(4) .emo{animation-delay:1.2s}
  @keyframes wiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(6deg)}}
  .dest.on::after{
    content:'★';position:absolute;top:-12px;right:-10px;width:32px;height:32px;
    background:#fde047;color:#92400e;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:900;border:1.5px solid #fff;animation:spin 2s linear infinite;
  }
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  /* Question cards (speech bubble style) */
  .qs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:680px){.qs{grid-template-columns:1fr}}
  .q{
    padding:20px 12px;border-radius:24px;cursor:pointer;text-align:center;
    background:#fff;border:2px solid #e5e7eb;transition:.25s;position:relative;
    box-shadow:0 6px 14px rgba(0,0,0,.05);
  }
  .q:hover:not(.done):not(.busy){transform:translateY(-4px) rotate(-1deg);border-color:#fb923c;box-shadow:0 12px 24px rgba(251,146,60,.25)}
  .q.busy{
    border-color:#f59e0b;background:linear-gradient(180deg,#fffbeb,#fef3c7);
    animation:wobble 0.6s ease infinite;
  }
  @keyframes wobble{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
  .q.done{
    background:linear-gradient(180deg,#dcfce7,#bbf7d0);border-color:#22c55e;
  }
  .q.done::after{
    content:'⭐';position:absolute;top:-10px;right:-10px;width:36px;height:36px;
    background:#fde047;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:18px;border:1.5px solid #fff;animation:pulseStar 1.5s ease infinite;
  }
  @keyframes pulseStar{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  .q .qe{font-size:46px;display:block;margin-bottom:6px;filter:drop-shadow(0 2px 0 rgba(0,0,0,.1))}
  .q .qt{font-size:17px;font-weight:900;color:#7c2d12;line-height:1.3}
  .q .qh{font-size:14px;color:#9a3412;margin-top:5px;font-weight:600;background:#fed7aa;padding:3px 8px;border-radius:999px;display:inline-block}

  /* Lock overlay */
  .lock{position:relative;opacity:.55;pointer-events:none}
  .lock::before{
    content:'🔒 先选个地方哦～';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#fff;padding:8px 16px;border-radius:999px;font-size:14px;font-weight:900;
    color:#9a3412;border:1.5px dashed #fb923c;z-index:5;
  }

  /* Chat */
  .chat{
    margin-top:18px;background:linear-gradient(180deg,#f0f9ff,#e0f2fe);
    border-radius:24px;padding:18px;display:none;border:1.5px dashed #38bdf8;
  }
  .chat.show{display:block}
  .bubble-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px}
  .bubble-row.me{flex-direction:row-reverse}
  .avatar{
    width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:28px;flex-shrink:0;border:1.5px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.15);
  }
  .avatar.me{background:linear-gradient(180deg,#fde68a,#fbbf24)}
  .avatar.ai{background:linear-gradient(180deg,#a7f3d0,#10b981);animation:bounce 2s ease infinite}
  .bubble{
    padding:14px 18px;border-radius:22px;max-width:78%;font-size:17px;line-height:1.7;
    white-space:pre-wrap;word-break:break-word;font-weight:600;
    box-shadow:0 4px 10px rgba(0,0,0,.06);
  }
  .bubble.me{
    background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;
    border-bottom-right-radius:6px;
  }
  .bubble.ai{
    background:#fff;color:#3d2914;
    border-bottom-left-radius:6px;border:2px solid #d1fae5;
  }
  .typing{display:inline-block;width:8px;height:18px;background:#10b981;margin-left:3px;animation:blink .7s infinite;vertical-align:middle;border-radius:2px}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Plan (notebook style) */
  .plan{
    margin-top:20px;background:
      repeating-linear-gradient(180deg,#fff 0 36px,#fde68a 36px 37px);
    border-radius:20px;padding:22px 26px 22px 56px;display:none;
    border:2px solid #fbbf24;box-shadow:0 10px 24px rgba(251,191,36,.25);
    position:relative;
  }
  .plan::before{
    content:'';position:absolute;left:34px;top:0;bottom:0;width:2px;background:#ef4444;
  }
  .plan.show{display:block;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .plan h4{
    font-size:22px;font-weight:900;margin-bottom:14px;color:#92400e;
    display:flex;align-items:center;gap:8px;
  }
  .plan h4::after{
    content:'🎉';animation:wiggle 1.5s ease infinite;
  }
  .plan ul{list-style:none;padding:0}
  .plan li{
    padding:10px 0;font-size:16px;color:#7c2d12;line-height:1.6;font-weight:600;
    display:flex;align-items:flex-start;gap:8px;border-bottom:1px dashed #fcd34d;
  }
  .plan li:last-child{border-bottom:0}
  .plan li b{color:#9a3412}
  .plan li .pi{font-size:22px;flex-shrink:0;line-height:1.2}

  /* Reset button */
  .btnline{display:flex;justify-content:center;margin-top:20px}
  .resetBtn{
    background:linear-gradient(135deg,#fb923c,#ef4444);color:#fff;border:0;
    padding:14px 32px;border-radius:999px;font-weight:900;cursor:pointer;font-size:17px;
    box-shadow:0 3px 0 #c2410c, 0 6px 12px rgba(239,68,68,.3);
    transition:.15s;font-family:inherit;
  }
  .resetBtn:hover{transform:translateY(2px);box-shadow:0 4px 0 #c2410c, 0 6px 12px rgba(239,68,68,.3)}
  .resetBtn:active{transform:translateY(6px);box-shadow:0 0 0 #c2410c, 0 2px 6px rgba(239,68,68,.3)}

  @media(max-width:680px){
    .hero{padding:18px 18px 22px;gap:12px}
    .mascot{width:80px;height:80px;font-size:54px}
    .mascot::after{display:none}
    .mascot::before{display:none}
    .hero h1{font-size:22px}
    .hero-sub{font-size:15px}
    .hero-badge{position:static;margin-top:8px;display:inline-block;transform:none}
  }
</style>
</head>
<body>

<span class="deco d1">☁️</span>
<span class="deco d2">⭐</span>
<span class="deco d3">🌈</span>
<span class="deco d4">☁️</span>
<span class="deco d5">🎈</span>

<div class="wrap">

  <div class="hero">
    <div class="mascot">🦊</div>
    <div class="hero-text">
      <h1 data-pinyin>AI 小帮手 — 周末出行小问答</h1>
      <div class="hero-sub" data-pinyin>我是小狐狐，今天我们一起让 AI 小机器人帮我们做周末计划吧！</div>
    </div>
    <div class="hero-badge" data-pinyin>第三单元 · 第十课</div>
  </div>

  <div class="stamps">
    <div class="stamps-label" data-pinyin>🏆 收集 3 个印章就完成啦！</div>
    <div class="stamps-row" id="stampsRow">
      <div class="stamp" data-k="weather">🌤️<span class="lab" data-pinyin>天气</span></div>
      <div class="stamp" data-k="bring">🎒<span class="lab" data-pinyin>装备</span></div>
      <div class="stamp" data-k="how">🚌<span class="lab" data-pinyin>安全</span></div>
    </div>
  </div>

  <div class="card">
    <div class="step-title" data-pinyin><div class="step-num">1</div>这个周末我想去……</div>
    <div class="dests" id="destBox"></div>
  </div>

  <div class="card" id="qCard">
    <div class="step-title" data-pinyin><div class="step-num">2</div>问 AI 小帮手三个问题</div>
    <div class="qs" id="qBox"></div>

    <div class="chat" id="chat"></div>

    <div class="plan" id="plan">
      <h4 data-pinyin>📋 我的周末出行小计划</h4>
      <ul id="planList"></ul>
    </div>

    <div class="btnline">
      <button class="resetBtn" onclick="resetAll()">🔄 重新规划一次</button>
    </div>
  </div>
</div>

<script>
const DESTS = [
  { key: 'park',   name: '公园',   emo: '🏞️' },
  { key: 'mtn',    name: '爬山',   emo: '🏔️' },
  { key: 'sea',    name: '海边',   emo: '🏖️' },
  { key: 'museum', name: '博物馆', emo: '🏛️' }
];

const QUESTIONS = [
  { key: 'weather', emo: '🌤️', tpl: '我周末想去 {dest}，{dest} 这种地方一般是什么样的天气？要不要带伞？',  label: '天气怎么样？',  hint: '要不要带伞' },
  { key: 'bring',   emo: '🎒', tpl: '我周末要去 {dest} 玩，应该带哪些东西？请列 3 样最重要的。',          label: '要带什么？',     hint: 'AI 帮列清单' },
  { key: 'how',     emo: '🚌', tpl: '小朋友去 {dest} 玩，路上要注意什么？请说 1 到 2 条安全小提醒。',     label: '路上注意啥？',   hint: '安全小提醒' }
];

let selectedDest = null;
const answered = {};
let busy = false;

function renderDest(){
  const box = document.getElementById('destBox'); box.innerHTML = '';
  DESTS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dest' + (selectedDest && selectedDest.key === d.key ? ' on' : '');
    el.dataset.pinyin = '';
    el.innerHTML = `<span class="emo">${d.emo}</span>${d.name}`;
    el.onclick = () => {
      if(busy) return;
      if(selectedDest && selectedDest.key === d.key) return;
      if(Object.keys(answered).length > 0){
        if(!confirm('换地方就要重新问哦，确定换吗？')) return;
        clearChat();
      }
      selectedDest = d;
      renderDest();
      renderQuestions();
      document.getElementById('qCard').classList.remove('lock');
    };
    box.appendChild(el);
  });
}

function renderQuestions(){
  const box = document.getElementById('qBox'); box.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const el = document.createElement('div');
    el.className = 'q' + (answered[q.key] ? ' done' : '');
    el.dataset.pinyin = '';
    el.innerHTML = `<span class="qe">${q.emo}</span><div class="qt">${q.label}</div><div class="qh">${q.hint}</div>`;
    el.onclick = () => ask(i);
    box.appendChild(el);
  });
}

function updateStamp(key){
  const s = document.querySelector(`.stamp[data-k="${key}"]`);
  if(s) s.classList.add('got');
}

async function ask(qIdx){
  if(!selectedDest || busy) return;
  const q = QUESTIONS[qIdx];
  if(answered[q.key]) return;

  busy = true;
  const cards = document.querySelectorAll('.q');
  cards[qIdx].classList.add('busy');

  const chat = document.getElementById('chat');
  chat.classList.add('show');

  const userText = q.tpl.replaceAll('{dest}', selectedDest.name);

  const meRow = document.createElement('div');
  meRow.className = 'bubble-row me';
  meRow.innerHTML = `<div class="avatar me">🧒</div><div class="bubble me"></div>`;
  meRow.querySelector('.bubble').textContent = userText;
  chat.appendChild(meRow);

  const aiRow = document.createElement('div');
  aiRow.className = 'bubble-row';
  aiRow.innerHTML = `<div class="avatar ai">🤖</div><div class="bubble ai"></div>`;
  const aiBubble = aiRow.querySelector('.bubble');
  const aiSpan = document.createElement('span');
  const cursor = document.createElement('span');
  cursor.className = 'typing';
  aiBubble.appendChild(aiSpan);
  aiBubble.appendChild(cursor);
  chat.appendChild(aiRow);
  chat.scrollTop = chat.scrollHeight;
  meRow.scrollIntoView({behavior:'smooth', block:'end'});

  const sysHint = '你是给小学二年级小朋友用的周末出行小助手。回答要短，3 句话以内，用小朋友能懂的简单话，可以用 emoji。不要追问，不要给免责声明。';

  let answer = '';
  try {
    await chatStream(
      [{ role: 'user', content: sysHint + '\n\n小朋友的问题：' + userText }],
      (full) => {
        answer = full;
        aiSpan.textContent = full;
        chat.scrollTop = chat.scrollHeight;
      }
    );
    if(!answer) aiSpan.textContent = '（AI 小帮手好像有点累了，再点一次试试～）';
    answered[q.key] = answer || '（无回答）';
  } catch(e){
    aiSpan.textContent = '（连不上 AI 小帮手，请检查网络再试一次）';
  } finally {
    cursor.remove();
    cards[qIdx].classList.remove('busy');
    cards[qIdx].classList.add('done');
    busy = false;
    renderQuestions();
    updateStamp(q.key);
    if(Object.keys(answered).length === QUESTIONS.length) showPlan();
  }
}

function showPlan(){
  const plan = document.getElementById('plan');
  const list = document.getElementById('planList');
  list.innerHTML = '';
  list.innerHTML += `<li><span class="pi">🎯</span><span>目的地：<b>${selectedDest.emo} ${selectedDest.name}</b></span></li>`;
  QUESTIONS.forEach(q => {
    const ans = (answered[q.key] || '').replace(/\s+/g, ' ').trim();
    const short = ans.length > 80 ? ans.slice(0, 80) + '…' : ans;
    list.innerHTML += `<li><span class="pi">${q.emo}</span><span><b>${q.label}</b> ${short}</span></li>`;
  });
  list.innerHTML += `<li><span class="pi">💡</span><span>想一想：AI 小帮手的建议你都同意吗？哪一条最有用？</span></li>`;
  plan.classList.add('show');
}

function clearChat(){
  for(const k in answered) delete answered[k];
  document.getElementById('chat').innerHTML = '';
  document.getElementById('chat').classList.remove('show');
  document.getElementById('plan').classList.remove('show');
  document.getElementById('planList').innerHTML = '';
  document.querySelectorAll('.stamp').forEach(s => s.classList.remove('got'));
}

function resetAll(){
  selectedDest = null;
  clearChat();
  renderDest();
  renderQuestions();
  document.getElementById('qCard').classList.add('lock');
}

async function chatStream(messages, onDelta){
  const res = await fetch('https://api.qa.bingotalk.cn/api/v2/comm/vt/aiChat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(messages)
  });
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '', full = '';
  while(true){
    const { value, done } = await reader.read();
    if(done) break;
    buf += dec.decode(value, { stream: true });
    const parts = buf.replace(/}\s*{/g, '}\n{').split('\n');
    buf = parts.pop();
    for(const p of parts){
      const s = p.trim();
      if(!s) continue;
      try {
        const d = JSON.parse(s);
        const t = d?.data?.result || '';
        if(t){ full += t; onDelta(full); }
      } catch(e){}
    }
  }
  if(buf.trim()){
    try {
      const d = JSON.parse(buf);
      const t = d?.data?.result || '';
      if(t){ full += t; onDelta(full); }
    } catch(e){}
  }
}

renderDest();
renderQuestions();
document.getElementById('qCard').classList.add('lock');
</script>
<script>
/* 给页面中标记了 data-pinyin 的元素自动加拼音（面向二年级小朋友）
   给需要注音的元素加上 data-pinyin 属性，只有这些元素内的文字才会加拼音。
*/
(function () {
  const SKIP_TAGS = new Set(['SCRIPT', 'STYLE', 'NOSCRIPT', 'TEXTAREA', 'INPUT', 'RUBY', 'RT', 'RP', 'CODE', 'PRE']);
  const HAS_HAN = /[\u4e00-\u9fa5]/;
  const HAN_RUN = /^[\u4e00-\u9fa5]+$/;
  let observer = null;

  function injectStyles() {
    if (document.getElementById('__pyStyle')) return;
    const s = document.createElement('style');
    s.id = '__pyStyle';
    s.textContent = `
      ruby { ruby-position: over; ruby-align: center; }
      ruby > rt {
        font-size: 0.55em;
        color: #ec4899;
        font-weight: 500;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        line-height: 1.1;
        opacity: 0.92;
        user-select: none;
        letter-spacing: 0;
      }
      h1 ruby > rt, h2 ruby > rt, h3 ruby > rt { color: inherit; opacity: 0.85; }
      button ruby > rt, .btn ruby > rt { color: inherit; opacity: 0.9; }
    `;
    (document.head || document.documentElement).appendChild(s);
  }

  function hasPinyinMarker(node) {
    let el = node.nodeType === 3 ? node.parentNode : node;
    while (el) {
      if (el.nodeType !== 1) { el = el.parentNode; continue; }
      if (el.dataset && el.dataset.pinyin !== undefined) return true;
      if (el === document.body) break;
      el = el.parentNode;
    }
    return false;
  }

  function annotateText(node) {
    if (!hasPinyinMarker(node)) return;
    const text = node.nodeValue;
    if (!text || !HAS_HAN.test(text)) return;
    const parent = node.parentNode;
    if (!parent) return;
    const tag = parent.tagName;
    if (tag && SKIP_TAGS.has(tag)) return;

    const parts = text.split(/([\u4e00-\u9fa5]+)/);
    if (parts.length <= 1) return;

    const frag = document.createDocumentFragment();
    for (const part of parts) {
      if (!part) continue;
      if (HAN_RUN.test(part)) {
        let arr;
        try {
          arr = window.pinyinPro.pinyin(part, { toneType: 'symbol', type: 'array', nonZh: 'consecutive' });
        } catch (e) {
          arr = [];
        }
        for (let i = 0; i < part.length; i++) {
          const r = document.createElement('ruby');
          r.appendChild(document.createTextNode(part[i]));
          const rt = document.createElement('rt');
          rt.textContent = arr[i] || '';
          r.appendChild(rt);
          frag.appendChild(r);
        }
      } else {
        frag.appendChild(document.createTextNode(part));
      }
    }
    parent.replaceChild(frag, node);
  }

  function annotate(node) {
    if (!node) return;
    if (node.nodeType === 3) { annotateText(node); return; }
    if (node.nodeType !== 1) return;
    const tag = node.tagName;
    if (SKIP_TAGS.has(tag)) return;
    const kids = Array.from(node.childNodes);
    for (const k of kids) annotate(k);
  }

  function startObserver() {
    if (!('MutationObserver' in window)) return;
    observer = new MutationObserver((muts) => {
      for (const m of muts) {
        if (m.type === 'childList') {
          for (const n of m.addedNodes) annotate(n);
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  function run() {
    if (!window.pinyinPro || !window.pinyinPro.pinyin) {
      setTimeout(run, 80);
      return;
    }
    injectStyles();
    annotate(document.body);
    startObserver();
  }

  function bootstrap() {
    if (window.pinyinPro) { run(); return; }
    const tryLoad = (urls) => {
      if (!urls.length) { console.warn('[pinyin] CDN 加载失败，未能注音'); return; }
      const s = document.createElement('script');
      s.src = urls[0];
      s.onload = run;
      s.onerror = () => tryLoad(urls.slice(1));
      (document.head || document.documentElement).appendChild(s);
    };
    tryLoad([
      'https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js',
      'https://unpkg.com/pinyin-pro@3.26.0/dist/index.js',
      'https://fastly.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js'
    ]);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrap);
  } else {
    bootstrap();
  }
})();

</script>
