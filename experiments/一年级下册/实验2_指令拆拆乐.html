<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指令拆拆乐 - AI实验二</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --sky1:#a8e6ff;--sky2:#e0f7ff;--correct:#4ecb71;--wrong:#ff6b6b;
    --accent:#ff9f43;--purple:#a855f7;--blue:#3b82f6;--pink:#f472b6;
    --robot-body:#5b9bff;--slot-bg:#f0f4ff;--slot-border:#b8d4f0;
  }
  body{
    font-family:'Noto Sans SC',sans-serif;
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 40%,#d4edda 75%,#8BC34A 100%);
    min-height:100vh;overflow-x:hidden;
  }
  .cloud{position:fixed;background:#fff;border-radius:50px;opacity:.65;z-index:0}
  .cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
  .c1{width:120px;height:40px;top:28px;animation:fc 26s linear infinite}
  .c1::before{width:50px;height:50px;top:-25px;left:20px}.c1::after{width:70px;height:55px;top:-20px;left:45px}
  .c2{width:90px;height:30px;top:78px;animation:fc 36s linear infinite;animation-delay:-12s}
  .c2::before{width:40px;height:40px;top:-20px;left:15px}.c2::after{width:55px;height:45px;top:-18px;left:35px}
  .c3{width:105px;height:34px;top:52px;animation:fc 30s linear infinite;animation-delay:-22s}
  .c3::before{width:44px;height:44px;top:-22px;left:18px}.c3::after{width:60px;height:48px;top:-19px;left:40px}
  @keyframes fc{from{left:-200px}to{left:110vw}}

  .wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:16px 14px 40px}

  .title{text-align:center;margin-bottom:6px;animation:popIn .7s ease}
  .title h1{font-size:2.1em;font-weight:900;background:linear-gradient(135deg,var(--accent),#ff6b6b,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;filter:drop-shadow(2px 3px 0 rgba(0,0,0,.07))}
  .title p{color:#5a7a9a;font-size:.92em;margin-top:2px}

  /* ===== Robot ===== */
  .robot-row{display:flex;justify-content:center;align-items:flex-end;height:150px;margin:6px 0 12px;position:relative}
  .robot{position:relative;width:100px;animation:rb 2s ease-in-out infinite}
  .robot.celebrating{animation:rJump .45s ease infinite}
  @keyframes rb{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes rJump{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-18px) rotate(-8deg)}75%{transform:translateY(-18px) rotate(8deg)}}
  .r-head{width:72px;height:62px;background:var(--robot-body);border-radius:18px 18px 14px 14px;margin:0 auto;position:relative;box-shadow:inset 0 -8px 0 rgba(0,0,0,.1),0 4px 12px rgba(91,155,255,.3)}
  .r-ant{position:absolute;width:4px;height:16px;background:#888;top:-16px;left:50%;transform:translateX(-50%);border-radius:2px}
  .r-ant::after{content:'';position:absolute;width:10px;height:10px;background:#ff5252;border-radius:50%;top:-8px;left:50%;transform:translateX(-50%);animation:blink 1.5s ease infinite}
  @keyframes blink{0%,100%{opacity:1;box-shadow:0 0 8px #ff5252}50%{opacity:.3;box-shadow:none}}
  .r-eye{position:absolute;width:16px;height:18px;background:#fff;border-radius:50%;top:16px;box-shadow:inset 0 2px 4px rgba(0,0,0,.1)}
  .r-eye.l{left:14px}.r-eye.r{right:14px}
  .r-pupil{width:8px;height:9px;background:#333;border-radius:50%;position:absolute;top:5px;left:4px;transition:transform .3s}
  .robot.look-r .r-pupil{transform:translateX(4px)}
  .robot.look-l .r-pupil{transform:translateX(-3px)}
  .robot.look-d .r-pupil{transform:translateY(3px)}
  .r-cheek{position:absolute;width:12px;height:7px;background:rgba(255,150,180,.5);border-radius:50%;top:30px;opacity:0;transition:opacity .3s}
  .r-cheek.l{left:6px}.r-cheek.r{right:6px}
  .robot.happy .r-cheek,.robot.celebrating .r-cheek{opacity:1}
  .r-mouth{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:20px;height:8px;border-bottom:3px solid #333;border-radius:0 0 10px 10px;transition:all .35s}
  .robot.happy .r-mouth,.robot.celebrating .r-mouth{width:28px;height:14px;border-bottom-width:4px}
  .robot.sad .r-mouth{border-radius:10px 10px 0 0;border-bottom:none;border-top:3px solid #333}
  .robot.thinking .r-mouth{width:10px;height:10px;border:3px solid #333;border-radius:50%;border-bottom:none}
  .r-body{width:58px;height:52px;background:var(--robot-body);margin:4px auto 0;border-radius:10px;position:relative;box-shadow:inset 0 -6px 0 rgba(0,0,0,.1),0 4px 12px rgba(91,155,255,.2)}
  .r-belly{position:absolute;width:32px;height:22px;background:rgba(255,255,255,.3);border-radius:8px;top:10px;left:50%;transform:translateX(-50%);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center}
  .r-heart{color:#ff6b8a;font-size:12px;animation:hb 1.2s ease infinite}
  @keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
  .r-arm{position:absolute;width:14px;height:36px;background:#4a8ae6;border-radius:7px;top:8px;transform-origin:top center;transition:transform .3s}
  .r-arm.l{left:-16px;transform:rotate(10deg)}.r-arm.r{right:-16px;transform:rotate(-10deg)}
  .robot.wave .r-arm.r{animation:wave .5s ease 3}
  .robot.clap .r-arm.l{animation:clapL .35s ease 4}.robot.clap .r-arm.r{animation:clapR .35s ease 4}
  .robot.point .r-arm.r{transform:rotate(-80deg)}
  @keyframes wave{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(-60deg)}}
  @keyframes clapL{0%,100%{transform:rotate(10deg)}50%{transform:rotate(40deg)}}
  @keyframes clapR{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(-40deg)}}
  .r-legs{text-align:center}
  .r-leg{width:16px;height:20px;background:#4a8ae6;border-radius:0 0 8px 8px;display:inline-block;margin:2px 4px 0}

  .bubble{position:absolute;right:-14px;top:-5px;background:#fff;padding:10px 16px;border-radius:16px;font-size:.88em;font-weight:700;color:#444;box-shadow:0 4px 18px rgba(0,0,0,.1);max-width:240px;text-align:center;line-height:1.5;z-index:2}
  .bubble.anim{animation:fadeUp .4s ease}
  .bubble::before{content:'';position:absolute;left:-10px;bottom:14px;border:6px solid transparent;border-right-color:#fff}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ===== Mode Switch ===== */
  .mode-bar{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
  .mode-btn{padding:10px 26px;border:3px solid transparent;border-radius:40px;font-family:inherit;font-size:1em;font-weight:900;cursor:pointer;transition:all .3s;background:#fff;color:#666;box-shadow:0 3px 10px rgba(0,0,0,.07);letter-spacing:1px}
  .mode-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.12)}
  .mode-btn.on-m{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 4px 18px rgba(59,130,246,.35)}
  .mode-btn.on-a{background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#fff;box-shadow:0 4px 18px rgba(255,159,67,.35)}

  .banner{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center;padding:13px 20px;border-radius:16px;font-size:1.25em;font-weight:900;margin-bottom:12px;box-shadow:0 6px 22px rgba(118,75,162,.3);letter-spacing:3px;position:relative;overflow:hidden}
  .banner::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.1) 50%,transparent 60%);animation:shimmer 3s infinite}
  @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

  .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .tab{padding:7px 18px;border:none;border-radius:30px;font-family:inherit;font-size:.92em;font-weight:700;cursor:pointer;transition:all .3s;background:#fff;color:#666;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .tab:hover{transform:translateY(-2px)}.tab.on{background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#fff;box-shadow:0 4px 14px rgba(255,159,67,.35)}
  .tab.done{background:var(--correct);color:#fff}

  .speed-bar{display:none;justify-content:center;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .speed-bar.show{display:flex}
  .speed-label{font-weight:700;color:#5a7a9a;font-size:.9em}
  .sp-btn{padding:5px 14px;border:2px solid #d0d8e8;border-radius:20px;font-family:inherit;font-weight:700;font-size:.85em;cursor:pointer;background:#fff;color:#666;transition:all .3s}
  .sp-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .auto-prog{display:none;text-align:center;margin-bottom:10px}
  .auto-prog.show{display:block}
  .prog-bg{width:100%;height:10px;background:#e8ecf0;border-radius:5px;overflow:hidden;margin:6px 0}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--correct));border-radius:5px;transition:width .5s ease;width:0}
  .prog-txt{font-size:.85em;color:#888;font-weight:700}

  .score{display:flex;justify-content:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
  .si{background:#fff;padding:7px 16px;border-radius:30px;font-weight:700;font-size:.88em;color:#555;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:5px}
  .si .n{color:var(--accent);font-size:1.15em;font-variant-numeric:tabular-nums}

  /* Slots */
  .slots{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
  .slot{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--slot-bg);border:2.5px dashed var(--slot-border);border-radius:14px;min-height:54px;transition:all .35s;position:relative}
  .slot .lb{font-size:.78em;font-weight:900;color:#8ba4c4;white-space:nowrap;min-width:44px}
  .slot.drag-over{border-color:var(--blue);background:#dbeafe;transform:scale(1.02);box-shadow:0 0 16px rgba(59,130,246,.18)}
  .slot.filled{border-style:solid;border-color:var(--correct);background:#ecfdf5}
  .slot.hl{border-color:var(--accent);background:#fff7ed;box-shadow:0 0 20px rgba(255,159,67,.3);transform:scale(1.03);animation:pulse .8s ease infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,159,67,.3)}50%{box-shadow:0 0 30px rgba(255,159,67,.5)}}
  .placed{flex:1;padding:8px 14px;background:var(--correct);color:#fff;border-radius:10px;font-weight:700;font-size:1.02em;box-shadow:0 3px 8px rgba(78,203,113,.3);display:flex;align-items:center;gap:8px;animation:slideIn .5s cubic-bezier(.34,1.56,.64,1)}
  .placed::before{content:'\2713';font-size:1.1em}
  @keyframes slideIn{0%{transform:translateX(60px) scale(.7);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}

  .cards-lbl{text-align:center;font-weight:900;color:#6a7fa8;margin-bottom:8px;font-size:.95em}
  .cards{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;min-height:56px;padding:12px;background:rgba(255,255,255,.45);border-radius:16px;border:2px dashed #d0d8e8;margin-bottom:16px}
  .card{padding:9px 18px;background:#fff;border-radius:12px;font-weight:700;font-size:1.02em;color:#444;cursor:grab;box-shadow:0 3px 10px rgba(0,0,0,.08);transition:all .3s;user-select:none;border:2.5px solid #e0e7f0;position:relative}
  .card:hover{transform:translateY(-4px) rotate(-1deg);box-shadow:0 6px 18px rgba(0,0,0,.13);border-color:var(--blue)}
  .card.sel{outline:3px solid var(--blue);outline-offset:2px;transform:translateY(-3px);box-shadow:0 6px 20px rgba(59,130,246,.25)}
  .card.dragging{opacity:.35;transform:scale(.92)}
  .card.wrong{animation:shake .5s ease;border-color:var(--wrong);background:#fff0f0}
  .card.ap{border-color:var(--accent);background:#fff7ed;box-shadow:0 0 24px rgba(255,159,67,.4);transform:scale(1.08);z-index:5;animation:apk .6s ease}
  .card.fly{position:fixed!important;z-index:999;transition:none;pointer-events:none;box-shadow:0 8px 30px rgba(78,203,113,.4);border-color:var(--correct);background:#f0fdf4}
  @keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-8px) rotate(-3deg)}40%{transform:translateX(8px) rotate(3deg)}60%{transform:translateX(-5px) rotate(-2deg)}80%{transform:translateX(5px) rotate(2deg)}}
  @keyframes apk{0%{transform:scale(1);box-shadow:0 3px 10px rgba(0,0,0,.08)}50%{transform:scale(1.12);box-shadow:0 0 30px rgba(255,159,67,.5)}100%{transform:scale(1.08);box-shadow:0 0 24px rgba(255,159,67,.4)}}
  @keyframes popIn{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

  .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{padding:10px 26px;border:none;border-radius:30px;font-family:inherit;font-weight:900;font-size:.95em;cursor:pointer;transition:all .3s;letter-spacing:1px}
  .btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-p{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.3)}
  .btn-w{background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#fff;box-shadow:0 4px 14px rgba(255,159,67,.3)}
  .btn-g{background:linear-gradient(135deg,var(--correct),#34a853);color:#fff;box-shadow:0 4px 14px rgba(78,203,113,.3)}

  .cele{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;pointer-events:none}
  .cele.on{display:block}
  .conf{position:absolute;animation:cfall linear forwards}
  @keyframes cfall{0%{transform:translateY(-20px) rotate(0) scale(1);opacity:1}80%{opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(.5);opacity:0}}

  .modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
  .modal-bg.on{display:flex}
  .modal{background:#fff;border-radius:24px;padding:34px 30px;text-align:center;max-width:390px;width:90%;animation:popIn .5s ease;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{font-size:1.5em;margin-bottom:4px;color:#333}
  .modal .stars{font-size:2.2em;margin:10px 0;letter-spacing:6px}
  .modal p{color:#666;font-size:.93em;margin-bottom:16px;line-height:1.65}

  /* Habit tip card */
/* 移动端触摸优化 */
.card,.btn,.mode-btn,.tab,.sp-btn,.modal button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.slot{touch-action:manipulation}
background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:14px;padding:12px 16px;margin:10px 0;text-align:left;font-size:.88em;line-height:1.6;color:#92400e}
  .tip-card b{color:#d97706}

  @media(max-width:600px){
    .wrap{padding:12px 10px 32px}
    .title h1{font-size:1.5em;letter-spacing:2px}.banner{font-size:.95em;padding:10px 14px;letter-spacing:1px}
    .robot-row{height:115px;margin:4px 0 8px}
    .robot{transform-origin:bottom center;scale:.8}
    .bubble{font-size:.75em;max-width:150px;right:-6px;padding:7px 10px}
    .card{font-size:.9em;padding:8px 14px;min-height:44px;display:flex;align-items:center;justify-content:center}
    .mode-btn{padding:9px 16px;font-size:.85em;flex:1}
    .mode-bar{gap:8px}
    .tab{padding:6px 12px;font-size:.82em}
    .slot{min-height:52px;padding:10px 12px}
    .slot .lb{font-size:.72em;min-width:36px}
    .placed{font-size:.92em;padding:7px 10px}
    .btn{padding:10px 20px;font-size:.9em;min-height:44px}
    .btns{gap:8px}
    .score{gap:8px}
    .si{padding:6px 10px;font-size:.8em}
    .sp-btn{padding:6px 12px;font-size:.82em;min-height:40px}
    .speed-bar{gap:8px}
    .modal{padding:24px 18px}
    .modal h2{font-size:1.3em}
    .banner{border-radius:12px}
  }
  @media(max-width:380px){
    .title h1{font-size:1.3em}
    .card{font-size:.85em;padding:7px 10px}
    .mode-btn{font-size:.8em;padding:8px 12px}
    .tab{padding:5px 9px;font-size:.78em}
    .si{font-size:.75em;padding:5px 8px}
    .slot{min-height:48px}
  }
</style>
</head>
<body>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
<div class="cele" id="cele"></div>
<div class="modal-bg" id="modBg">
  <div class="modal">
    <h2 id="modT"></h2>
    <div class="stars" id="modS"></div>
    <p id="modM"></p>
    <div id="modTip"></div>
    <button class="btn btn-p" onclick="closeMod()">继续挑战</button>
  </div>
</div>

<div class="wrap">
  <div class="title"><h1>&#x1F9E9; 指令拆拆乐 &#x1F916;</h1><p>把大任务拆成小步骤，排列正确的顺序！</p></div>

  <div class="robot-row">
    <div class="robot" id="robot">
      <div class="r-head">
        <div class="r-ant"></div>
        <div class="r-eye l"><div class="r-pupil"></div></div>
        <div class="r-eye r"><div class="r-pupil"></div></div>
        <div class="r-cheek l"></div><div class="r-cheek r"></div>
        <div class="r-mouth" id="rMouth"></div>
      </div>
      <div class="r-body">
        <div class="r-belly"><span class="r-heart">&#x2665;</span></div>
        <div class="r-arm l"></div><div class="r-arm r"></div>
      </div>
      <div class="r-legs"><div class="r-leg"></div><div class="r-leg"></div></div>
    </div>
    <div class="bubble anim" id="bubble">选择模式开始吧~</div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn on-m" id="btnM" onclick="setMode('manual')">&#x1F590;&#xFE0F; 我自己来</button>
    <button class="mode-btn" id="btnA" onclick="setMode('auto')">&#x1F916; 电脑来做</button>
  </div>

  <div class="speed-bar" id="speedBar">
    <span class="speed-label">演示速度：</span>
    <button class="sp-btn on" data-s="slow" onclick="setSpd('slow')">&#x1F422; 慢速</button>
    <button class="sp-btn" data-s="normal" onclick="setSpd('normal')">&#x1F6B6; 中速</button>
    <button class="sp-btn" data-s="fast" onclick="setSpd('fast')">&#x1F407; 快速</button>
  </div>

  <div class="banner">&#x1F3AF; 大任务：<span id="taskName">七步洗手</span> &#x1F3AF;</div>
  <div class="tabs" id="tabs"></div>

  <div class="auto-prog" id="autoProg">
    <div class="prog-txt" id="autoTxt">电脑正在思考中...</div>
    <div class="prog-bg"><div class="prog-fill" id="autoBar"></div></div>
  </div>

  <div class="score">
    <div class="si">&#x23F1;&#xFE0F; 用时: <span class="n" id="timer">00:00</span></div>
    <div class="si">&#x2705; 完成: <span class="n" id="done">0</span>/<span id="total">0</span></div>
    <div class="si" id="missSi">&#x274C; 失误: <span class="n" id="miss">0</span></div>
  </div>

  <div class="slots" id="slots"></div>
  <div class="cards-lbl" id="cardsLbl">&#x1F447; 把下面的步骤卡片拖到上面的位置 &#x1F447;</div>
  <div class="cards" id="cards"></div>

  <div class="btns">
    <button class="btn btn-w" onclick="resetScene()">&#x1F504; 重新开始</button>
    <button class="btn btn-g" id="autoBtn" style="display:none" onclick="startAuto()">&#x25B6;&#xFE0F; 开始演示</button>
  </div>
</div>

<script>
const scenes=[
  {
    name:"\u4E03\u6B65\u6D17\u624B",
    emoji:"\uD83E\uDDFC",
    steps:[
      "\u6253\u5F00\u6C34\u9F99\u5934",
      "\u628A\u53CC\u624B\u6253\u6E7F",
      "\u6324\u4E0A\u6D17\u624B\u6DB2",
      "\u6413\u6D17\u624B\u5FC3\u548C\u624B\u80CC",
      "\u4ED4\u7EC6\u6413\u6D17\u6307\u7F1D",
      "\u7528\u6E05\u6C34\u51B2\u5E72\u51C0",
      "\u64E6\u5E72\u53CC\u624B"
    ],
    tip:"\uD83D\uDCA1 <b>\u597D\u4E60\u60EF\u5C0F\u8D34\u58EB\uFF1A</b>\u996D\u524D\u4FBF\u540E\u3001\u5916\u51FA\u56DE\u5BB6\u90FD\u8981\u8BA4\u771F\u6D17\u624B\uFF0C\u7528\u6D41\u52A8\u6C34\u548C\u6D17\u624B\u6DB2\u6413\u6D17\u81F3\u5C1120\u79D2\uFF0C\u8FD9\u6837\u624D\u80FD\u628A\u7EC6\u83CC\u5B9D\u5B9D\u90FD\u8D76\u8D70\u54E6\uFF01"
  },
  {
    name:"\u5B89\u5168\u8FC7\u9A6C\u8DEF",
    emoji:"\uD83D\uDEA6",
    steps:[
      "\u8D70\u5230\u659C\u6591\u9A6C\u7EBF\u524D\u505C\u4E0B",
      "\u62AC\u5934\u770B\u4EA4\u901A\u4FE1\u53F7\u706F",
      "\u786E\u8BA4\u7EFF\u706F\u4EAE\u4E86",
      "\u5148\u5411\u5DE6\u770B\u6709\u6CA1\u6709\u8F66",
      "\u518D\u5411\u53F3\u770B\u6709\u6CA1\u6709\u8F66",
      "\u786E\u8BA4\u5B89\u5168\u540E\u5FEB\u6B65\u901A\u8FC7"
    ],
    tip:"\uD83D\uDCA1 <b>\u597D\u4E60\u60EF\u5C0F\u8D34\u58EB\uFF1A</b>\u8FC7\u9A6C\u8DEF\u4E00\u5B9A\u8981\u8D70\u659C\u6591\u9A6C\u7EBF\uFF0C\u7EFF\u706F\u4EAE\u4E86\u4E5F\u8981\u5148\u770B\u5DE6\u53F3\uFF0C\u786E\u8BA4\u6CA1\u6709\u8F66\u8F86\u518D\u901A\u8FC7\u3002\u8BB0\u4F4F\uFF1A\u201C\u4E00\u505C\u4E8C\u770B\u4E09\u901A\u8FC7\u201D\uFF01"
  },
  {
    name:"\u996D\u524D\u51C6\u5907",
    emoji:"\uD83C\uDF5A",
    steps:[
      "\u542C\u5230\u5F00\u996D\u94C3\u58F0\u505C\u4E0B\u6D3B\u52A8",
      "\u53BB\u6D17\u624B\u95F4\u6D17\u5E72\u51C0\u53CC\u624B",
      "\u56DE\u5230\u5EA7\u4F4D\u4E0A\u5750\u597D",
      "\u6446\u597D\u81EA\u5DF1\u7684\u9910\u5177",
      "\u5B89\u9759\u7B49\u5F85\u8001\u5E08\u8BF4\u5F00\u996D",
      "\u53CC\u624B\u7AEF\u597D\u7897\u5F00\u59CB\u5403\u996D"
    ],
    tip:"\uD83D\uDCA1 <b>\u597D\u4E60\u60EF\u5C0F\u8D34\u58EB\uFF1A</b>\u996D\u524D\u6D17\u624B\u662F\u597D\u4E60\u60EF\uFF0C\u5403\u996D\u65F6\u8981\u5750\u7AEF\u6B63\u3001\u4E0D\u6253\u95F9\uFF0C\u53CC\u624B\u7AEF\u7897\u4E0D\u6D12\u996D\u3002\u597D\u5B69\u5B50\u4ECE\u996D\u524D\u51C6\u5907\u5F00\u59CB\u505A\u8D77\uFF01"
  }
];

const SP={
  start:["\u55E8\uFF01\u5E2E\u6211\u6392\u597D\u6B65\u9AA4\u5427~","\u6211\u4E0D\u4F1A\u6392\u987A\u5E8F\uFF0C\u4F60\u6765\u6559\u6211\uFF01","\u54EA\u4E2A\u662F\u7B2C\u4E00\u6B65\u5462\uFF1F"],
  ok:["\u592A\u5389\u5BB3\u4E86\uFF01\uD83C\uDF89","\u5BF9\u5BF9\u5BF9\uFF01\u5C31\u662F\u8FD9\u6837\uFF01","\u4F60\u771F\u662F\u4E2A\u5C0F\u5929\u624D\uFF01","\u5B8C\u7F8E\uFF01\u7EE7\u7EED\u52A0\u6CB9\uFF01","\u6CA1\u9519\uFF01\u4E0B\u4E00\u6B65\u5462\uFF1F"],
  no:["\u5440\uFF0C\u987A\u5E8F\u4E0D\u5BF9\u54E6~","\u518D\u60F3\u60F3\uFF1F\u8BD5\u8BD5\u522B\u7684\uFF01","\u8FD9\u4E2A\u4E0D\u662F\u73B0\u5728\u8BE5\u505A\u7684~","\u55EF...\u597D\u50CF\u4E0D\u592A\u5BF9\u54E6~"],
  fin:["\u5168\u90E8\u5B8C\u6210\u4E86\uFF01\uD83C\uDF8A","\u592A\u68D2\u5566\uFF01\u4F60\u662F\u6700\u4F73\u5C0F\u52A9\u624B\uFF01","\u4EFB\u52A1\u5B8C\u6210\uFF01\u4F60\u597D\u5389\u5BB3\uFF01"],
  as:["\u770B\u6211\u6765\u8868\u6F14\uFF01","\u6211\u8981\u5F00\u59CB\u5566\uFF01\u6CE8\u610F\u770B\u54E6~","\u8BA9\u6211\u60F3\u60F3\u6B63\u786E\u7684\u987A\u5E8F\u2026"],
  at:["\u55EF\u2026\u8BA9\u6211\u60F3\u60F3\u2026","\u8FD9\u4E00\u6B65\u5E94\u8BE5\u662F\u2026","\u6211\u77E5\u9053\u4E86\uFF01"],
  ap:["\u627E\u5230\u4E86\uFF01\u5C31\u662F\u8FD9\u4E2A\uFF01","\u6CA1\u9519\uFF0C\u9009\u8FD9\u4E2A\uFF01","\u8FD9\u4E2A\u662F\u5BF9\u7684\uFF01"],
  apl:["\u653E\u597D\u5566\uFF01\u2728","\u5B8C\u7F8E\u653E\u5165\uFF01","\u641E\u5B9A\u8FD9\u4E00\u6B65\uFF01"],
  af:["\u770B\uFF01\u6211\u5168\u505A\u5B8C\u5566\uFF01\uD83C\uDF89","\u600E\u4E48\u6837\uFF0C\u6211\u5389\u5BB3\u5427\uFF1F","\u987A\u5E8F\u5C31\u662F\u8FD9\u6837\u7684\uFF01\u8BB0\u4F4F\u4E86\u5417\uFF1F"]
};

let mode='manual',cScene=0,cSlot=0,misses=0,secs=0,tmr=null,done=new Set(),sel=null;
let autoOn=false,autoStop=false,spd='slow';
const spdMs={slow:1800,normal:1000,fast:550};

function $$(id){return document.getElementById(id)}
function pk(a){return a[Math.floor(Math.random()*a.length)]}

function init(){renderTabs();loadScene(0)}

function setMode(m){
  if(autoOn){autoStop=true;return}
  mode=m;
  $$('btnM').className='mode-btn'+(m==='manual'?' on-m':'');
  $$('btnA').className='mode-btn'+(m==='auto'?' on-a':'');
  $$('speedBar').className='speed-bar'+(m==='auto'?' show':'');
  $$('autoBtn').style.display=m==='auto'?'inline-block':'none';
  $$('missSi').style.display=m==='auto'?'none':'flex';
  $$('cardsLbl').textContent=m==='manual'?'\uD83D\uDC47 \u628A\u4E0B\u9762\u7684\u6B65\u9AA4\u5361\u7247\u62D6\u5230\u4E0A\u9762\u7684\u4F4D\u7F6E \uD83D\uDC47':'\uD83D\uDC47 \u7535\u8111\u5C06\u81EA\u52A8\u6392\u5217\u8FD9\u4E9B\u5361\u7247 \uD83D\uDC47';
  say(m==='manual'?pk(SP.start):'\u70B9\u51FB\u201C\u5F00\u59CB\u6F14\u793A\u201D\u770B\u6211\u8868\u6F14\uFF01');
  mood('normal');resetScene();
}

function setSpd(s){spd=s;document.querySelectorAll('.sp-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===s))}

function renderTabs(){
  $$('tabs').innerHTML=scenes.map((s,i)=>`<button class="tab ${i===cScene?'on':(done.has(i)?'done':'')}" onclick="swScene(${i})">${s.emoji} ${s.name}</button>`).join('');
}
function swScene(i){if(autoOn)return;cScene=i;renderTabs();loadScene(i)}

function loadScene(i){
  const sc=scenes[i];
  $$('taskName').textContent=sc.name;
  cSlot=0;misses=0;secs=0;stopTmr();updUI();
  $$('total').textContent=sc.steps.length;
  $$('autoProg').className='auto-prog';
  $$('autoBar').style.width='0%';

  $$('slots').innerHTML=sc.steps.map((_,j)=>`<div class="slot" data-i="${j}"><span class="lb">\u7B2C${j+1}\u6B65</span></div>`).join('');

  const sh=[...sc.steps].map((s,j)=>({t:s,idx:j})).sort(()=>Math.random()-.5);
  $$('cards').innerHTML=sh.map(c=>`<div class="card" data-i="${c.idx}" draggable="true">${c.t}</div>`).join('');

  $$('cards').querySelectorAll('.card').forEach(c=>{
    c.addEventListener('dragstart',onDS);c.addEventListener('dragend',onDE);
    addTouchDrag(c);
  });
  $$('slots').querySelectorAll('.slot').forEach(s=>{
    s.addEventListener('dragover',onDO);s.addEventListener('dragleave',onDL);s.addEventListener('drop',onDR);
  });
  bindTouchOnSlots();
  if(mode==='manual')say(pk(SP.start));
}

function startTmr(){if(tmr)return;tmr=setInterval(()=>{secs++;updTmr()},1000)}
function stopTmr(){clearInterval(tmr);tmr=null;updTmr()}
function updTmr(){$$('timer').textContent=String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0')}
function updUI(){$$('done').textContent=cSlot;$$('miss').textContent=misses}

function say(t){const b=$$('bubble');b.classList.remove('anim');void b.offsetHeight;b.classList.add('anim');b.innerHTML=t}
function mood(m){
  const r=$$('robot');r.className='robot';
  if(m==='happy')r.classList.add('happy');
  else if(m==='sad')r.classList.add('sad');
  else if(m==='thinking')r.classList.add('thinking');
  else if(m==='celebrating')r.classList.add('celebrating','happy','clap');
  else if(m==='wave')r.classList.add('happy','wave');
  else if(m==='point')r.classList.add('happy','point');
}
function look(d){const r=$$('robot');r.classList.remove('look-r','look-l','look-d');if(d)r.classList.add('look-'+d)}

function onDS(e){if(mode!=='manual')return;startTmr();e.target.classList.add('dragging');e.dataTransfer.setData('text',e.target.dataset.i);sel=e.target}
function onDE(e){e.target.classList.remove('dragging');sel=null}
function onDO(e){e.preventDefault();if(mode!=='manual')return;if(!e.currentTarget.classList.contains('filled'))e.currentTarget.classList.add('drag-over')}
function onDL(e){e.currentTarget.classList.remove('drag-over')}
function onDR(e){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(mode!=='manual')return;tryPlace(parseInt(e.dataTransfer.getData('text')),e.currentTarget)}

/* ===== 触摸拖拽支持 ===== */
let touchClone=null,touchCard=null;
function addTouchDrag(card){
  card.addEventListener('touchstart',e=>{
    if(mode!=='manual')return;
    startTmr();
    touchCard=card;
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
    card.classList.add('sel');sel=card;
    e.stopPropagation();
  },{passive:true});
}
function bindTouchOnSlots(){
  $$('slots').querySelectorAll('.slot').forEach(s=>{
    s.addEventListener('touchstart',e=>{
      if(mode!=='manual'||!sel||s.classList.contains('filled'))return;
      e.preventDefault();
      tryPlace(parseInt(sel.dataset.i),s);
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
      sel=null;touchCard=null;
    },{passive:false});
  });
}

document.addEventListener('click',e=>{
  if(mode!=='manual'||autoOn)return;
  const card=e.target.closest('.card'),slot=e.target.closest('.slot');
  if(card){document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));card.classList.add('sel');sel=card;startTmr();return}
  if(slot&&!slot.classList.contains('filled')&&sel){tryPlace(parseInt(sel.dataset.i),slot);document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));sel=null}
});

function tryPlace(ci,slot){
  const si=parseInt(slot.dataset.i),sc=scenes[cScene];
  if(si!==cSlot){say("\u8981\u6309\u987A\u5E8F\u6765\u54E6\uFF01\u5148\u586B\u7B2C"+(cSlot+1)+"\u6B65~");mood('sad');look('d');setTimeout(()=>{mood('normal');look(null)},1400);return}
  if(ci===cSlot){
    fillSlot(slot,sc.steps[ci],ci);cSlot++;updUI();
    say(pk(SP.ok));mood('happy');look(null);
    if(cSlot>=sc.steps.length)finish();
    else setTimeout(()=>mood('normal'),1400);
  }else{
    misses++;updUI();
    document.querySelectorAll('.card').forEach(c=>{if(parseInt(c.dataset.i)===ci){c.classList.add('wrong');setTimeout(()=>c.classList.remove('wrong'),600)}});
    say(pk(SP.no));mood('sad');look('d');setTimeout(()=>{mood('normal');look(null)},1400);
  }
}

function fillSlot(slot,text,ci){
  slot.classList.add('filled');
  slot.innerHTML=`<span class="lb">\u7B2C${ci+1}\u6B65</span><div class="placed">${text}</div>`;
  document.querySelectorAll('.card').forEach(c=>{if(parseInt(c.dataset.i)===ci)c.style.display='none'});
}

function finish(){
  stopTmr();done.add(cScene);renderTabs();mood('celebrating');
  say(pk(mode==='auto'?SP.af:SP.fin));
  fireworks();setTimeout(()=>showMod(),1400);
}

/* ===== AUTO ===== */
function startAuto(){
  if(autoOn)return;
  resetScene();autoOn=true;autoStop=false;
  $$('autoBtn').disabled=true;
  $$('autoProg').className='auto-prog show';
  say(pk(SP.as));mood('wave');look(null);
  setTimeout(()=>autoStep(0),1200);
}

function autoStep(step){
  if(autoStop){autoEnd();return}
  const sc=scenes[cScene];
  if(step>=sc.steps.length){autoEnd();return}
  const ms=spdMs[spd];

  say(pk(SP.at));mood('thinking');look('d');
  $$('autoTxt').textContent='\u6B63\u5728\u601D\u8003\u7B2C '+(step+1)+'/'+sc.steps.length+' \u6B65\u2026';
  $$('autoBar').style.width=(step/sc.steps.length*100)+'%';

  setTimeout(()=>{
    if(autoStop){autoEnd();return}
    const card=document.querySelector('.card[data-i="'+step+'"]');
    if(!card){autoEnd();return}
    say(pk(SP.ap));mood('point');look('r');
    card.classList.add('ap');

    setTimeout(()=>{
      if(autoStop){autoEnd();return}
      const slot=$$('slots').children[step];
      slot.classList.add('hl');look('d');

      setTimeout(()=>{
        if(autoStop){autoEnd();return}
        flyCard(card,slot,()=>{
          if(autoStop){autoEnd();return}
          slot.classList.remove('hl');card.classList.remove('ap');
          fillSlot(slot,sc.steps[step],step);
          cSlot=step+1;updUI();
          say(pk(SP.apl));mood('wave');look(null);
          $$('autoBar').style.width=((step+1)/sc.steps.length*100)+'%';
          $$('autoTxt').textContent='\u5DF2\u5B8C\u6210 '+(step+1)+'/'+sc.steps.length+' \u6B65';
          if(step+1>=sc.steps.length){setTimeout(()=>finish(),600)}
          else setTimeout(()=>autoStep(step+1),ms*.5);
        });
      },ms*.35);
    },ms*.4);
  },ms*.55);
}

function flyCard(card,slot,cb){
  const cr=card.getBoundingClientRect(),sr=slot.getBoundingClientRect();
  const clone=card.cloneNode(true);
  clone.className='card fly';
  clone.style.left=cr.left+'px';clone.style.top=cr.top+'px';clone.style.width=cr.width+'px';
  document.body.appendChild(clone);card.style.visibility='hidden';

  const dx=sr.left+sr.width/2-cr.left-cr.width/2;
  const dy=sr.top+sr.height/2-cr.top-cr.height/2;
  const dur=650,t0=performance.now();

  function anim(now){
    const t=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-t,3);
    const arc=-90*Math.sin(Math.PI*t);
    clone.style.left=(cr.left+dx*ease)+'px';
    clone.style.top=(cr.top+dy*ease+arc)+'px';
    clone.style.transform='rotate('+ ((1-ease)*15-ease*5) +'deg) scale('+(1+.12*Math.sin(Math.PI*t))+')';
    if(t<1)requestAnimationFrame(anim);
    else{clone.remove();sparkle(sr.left+sr.width/2,sr.top+sr.height/2);cb()}
  }
  requestAnimationFrame(anim);
}

function sparkle(cx,cy){
  const cols=['#ffd93d','#ff9f43','#4ecb71','#5b9bff','#ff6b8a','#a855f7'];
  for(let i=0;i<14;i++){
    const s=document.createElement('div');
    s.style.cssText='position:fixed;left:'+cx+'px;top:'+cy+'px;width:8px;height:8px;border-radius:50%;background:'+cols[i%cols.length]+';z-index:998;pointer-events:none;';
    document.body.appendChild(s);
    const a=(Math.PI*2/14)*i,d=30+Math.random()*45;
    s.animate([{transform:'translate(0,0) scale(1.2)',opacity:1},{transform:'translate('+Math.cos(a)*d+'px,'+Math.sin(a)*d+'px) scale(0)',opacity:0}],{duration:500,easing:'ease-out',fill:'forwards'});
    setTimeout(()=>s.remove(),550);
  }
}

function autoEnd(){
  autoOn=false;autoStop=false;$$('autoBtn').disabled=false;
  document.querySelectorAll('.card.ap').forEach(c=>c.classList.remove('ap'));
  document.querySelectorAll('.slot.hl').forEach(s=>s.classList.remove('hl'));
  document.querySelectorAll('.card.fly').forEach(c=>c.remove());
}

/* ===== Shared ===== */
function fireworks(){
  const el=$$('cele');el.classList.add('on');el.innerHTML='';
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff8fd8','#a855f7','#ff9f43'];
  for(let i=0;i<100;i++){
    const c=document.createElement('div');c.className='conf';
    c.style.left=Math.random()*100+'vw';c.style.background=cols[i%7];
    const sz=6+Math.random()*10;c.style.width=sz+'px';c.style.height=sz+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    c.style.animationDuration=(1.5+Math.random()*2.5)+'s';
    c.style.animationDelay=Math.random()*.9+'s';
    el.appendChild(c);
  }
  setTimeout(()=>{el.classList.remove('on');el.innerHTML=''},4500);
}

function showMod(){
  const sc=scenes[cScene];let stars,msg;
  if(mode==='auto'){
    stars='\u2B50\u2B50\u2B50';
    msg='\u7535\u8111\u6210\u529F\u5B8C\u6210\u4E86\u201C'+sc.name+'\u201D\uFF01<br>\u4F60\u8BB0\u4F4F\u6B63\u786E\u7684\u987A\u5E8F\u4E86\u5417\uFF1F<br>\u8BD5\u8BD5\u5207\u6362\u5230\u201C\u6211\u81EA\u5DF1\u6765\u201D\u6A21\u5F0F\u6311\u6218\u5427\uFF01';
  }else{
    if(misses===0){stars='\u2B50\u2B50\u2B50';msg='\u4F60\u6210\u529F\u5B8C\u6210\u4E86\u201C'+sc.name+'\u201D\uFF01<br>\u96F6\u5931\u8BEF\uFF0C\u5B8C\u7F8E\uFF01\uD83C\uDFC6'}
    else if(misses<=2){stars='\u2B50\u2B50';msg='\u4F60\u6210\u529F\u5B8C\u6210\u4E86\u201C'+sc.name+'\u201D\uFF01<br>\u53EA\u6709'+misses+'\u6B21\u5931\u8BEF\uFF0C\u5F88\u68D2\uFF01'}
    else{stars='\u2B50';msg='\u4F60\u6210\u529F\u5B8C\u6210\u4E86\u201C'+sc.name+'\u201D\uFF01<br>\u6709'+misses+'\u6B21\u5931\u8BEF\uFF0C\u4E0B\u6B21\u52A0\u6CB9\uFF01'}
    msg+='<br>\u7528\u65F6: '+$$('timer').textContent;
  }
  $$('modT').textContent='\uD83C\uDF89 \u4EFB\u52A1\u5B8C\u6210\uFF01';
  $$('modS').textContent=stars;$$('modM').innerHTML=msg;
  $$('modTip').innerHTML='<div class="tip-card">'+sc.tip+'</div>';
  $$('modBg').classList.add('on');
}

function closeMod(){
  $$('modBg').classList.remove('on');
  let next=-1;for(let i=0;i<scenes.length;i++)if(!done.has(i)){next=i;break}
  if(next>=0)swScene(next);
  else{say("\u6240\u6709\u4EFB\u52A1\u90FD\u5B8C\u6210\u5566\uFF01\uD83C\uDF8A<br>\u4F60\u662F\u6700\u68D2\u7684\u597D\u4E60\u60EF\u5C0F\u8FBE\u4EBA\uFF01");mood('celebrating')}
}

function resetScene(){
  if(autoOn){autoStop=true;setTimeout(()=>loadScene(cScene),200);return}
  loadScene(cScene);
}

init();
</script>
