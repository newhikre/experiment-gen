<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能助手指令实验室</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --room-floor: #c9956b;
  --room-wall: #f0e0cc;
  --accent-warm: #ff6d3a;
  --accent-teal: #00bfa5;
  --accent-gold: #ffb300;
  --accent-blue: #29b6f6;
  --accent-pink: #f06292;
  --bg-panel: #faf6f1;
  --bg-card: #ffffff;
  --text-dark: #3e2723;
  --text-mid: #6d4c41;
  --text-light: #a1887f;
  --success: #2e7d32;
  --fail: #c62828;
  --shadow-soft: 0 4px 24px rgba(62,39,35,0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #f5ebe0;
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle grid bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: radial-gradient(circle, rgba(0,0,0,.018) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events:none;
  z-index:0;
}

.app { position:relative; z-index:1; max-width:1320px; margin:0 auto; padding:10px 14px 30px; }

/* Header */
.header { text-align:center; padding:14px 0 8px; }
.header h1 {
  font-family:'Baloo 2',cursive; font-size:2.1em; font-weight:800;
  background: linear-gradient(135deg, var(--accent-warm), #ff8a50);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header .sub { color:var(--text-mid); font-size:.88em; margin-top:2px; }

/* Mode tabs */
.mode-tabs { display:flex; justify-content:center; gap:10px; margin:8px 0 14px; }
.mode-tab {
  padding:7px 22px; border-radius:24px; border:2px solid #e0d5c8;
  background:var(--bg-card); color:var(--text-mid); font-family:inherit;
  font-size:.88em; font-weight:600; cursor:pointer; transition:all .3s;
}
.mode-tab:hover { border-color:var(--accent-warm); color:var(--accent-warm); }
.mode-tab.active {
  background:var(--accent-warm); color:#fff; border-color:var(--accent-warm);
  box-shadow:0 4px 16px rgba(255,109,58,.25);
}

/* Layout */
.main-layout { display:grid; grid-template-columns:1fr 350px; gap:14px; align-items:start; }


/* ===== ROOM SCENE ===== */
.room-container {
  background:var(--bg-card); border-radius:20px; overflow:hidden;
  box-shadow:var(--shadow-soft); border:1px solid rgba(0,0,0,.04);
}

.room-scene {
  position:relative; width:100%; aspect-ratio:16/10; overflow:hidden; cursor:default;
  background: linear-gradient(180deg, #eddcc6 0%, #e8d3b8 54%, var(--room-floor) 54.5%, #c08a5a 100%);
  transition: background 1s ease;
}

/* Wall texture */
.room-scene::before {
  content:''; position:absolute; top:0; left:0; right:0; height:54%;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 110px, rgba(0,0,0,.012) 110px, rgba(0,0,0,.012) 111px),
    linear-gradient(180deg, #f0e0cc 0%, #e8d3b8 100%);
  z-index:0;
}

/* Floor pattern */
.room-scene::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:46%;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(0,0,0,.025) 100px, rgba(0,0,0,.025) 102px),
    repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(0,0,0,.01) 50px, rgba(0,0,0,.01) 51px);
  z-index:0;
}

/* ===== WINDOW ===== */
.window-frame {
  position:absolute; top:4%; left:4%; width:26%; height:40%;
  border:7px solid #7b5b3a; border-radius:6px 6px 3px 3px;
  background: linear-gradient(180deg, #87ceeb 0%, #b3e5fc 50%, #e1f5fe 100%);
  z-index:2; box-shadow: inset 0 0 40px rgba(135,206,235,.3), 0 4px 12px rgba(0,0,0,.1);
  transition: background 1s;
}
.window-frame::before {
  content:''; position:absolute; left:50%; top:0; bottom:0; width:5px;
  background:#7b5b3a; transform:translateX(-50%);
}
.window-frame::after {
  content:''; position:absolute; top:50%; left:0; right:0; height:5px;
  background:#7b5b3a; transform:translateY(-50%);
}

/* Window light rays */
.window-light {
  position:absolute; top:4%; left:8%; width:40%; height:80%;
  background: linear-gradient(135deg, rgba(255,248,225,.15) 0%, transparent 60%);
  z-index:1; pointer-events:none; transition: opacity .8s;
  clip-path: polygon(0% 0%, 30% 0%, 100% 100%, 40% 100%);
}

/* ===== CURTAINS ===== */
.curtain-l, .curtain-r {
  position:absolute; top:1.5%; height:48%; z-index:3;
  transition: all .9s cubic-bezier(.25,.46,.45,.94);
}
.curtain-l {
  left:0.5%; width:9%;
  background: linear-gradient(100deg, #c62828 0%, #e53935 40%, #ef5350 70%, #e53935 100%);
  border-radius: 0 0 12px 4px;
  clip-path: polygon(0% 0%, 100% 0%, 88% 15%, 100% 30%, 90% 45%, 100% 60%, 88% 75%, 100% 90%, 92% 100%, 0% 100%);
  box-shadow: 3px 0 10px rgba(0,0,0,.12);
}
.curtain-r {
  left:28%; width:9%;
  background: linear-gradient(260deg, #c62828 0%, #e53935 40%, #ef5350 70%, #e53935 100%);
  border-radius: 0 0 4px 12px;
  clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 8% 100%, 0% 90%, 12% 75%, 0% 60%, 10% 45%, 0% 30%, 12% 15%);
  box-shadow: -3px 0 10px rgba(0,0,0,.12);
}
/* Open state */
.curtain-l.open { width:5%; }
.curtain-r.open { left:32%; width:5%; }
/* Closed state */
.curtain-l.closed { width:17%; }
.curtain-r.closed { left:17.5%; width:17%; }

.curtain-rod {
  position:absolute; top:1%; left:0%; width:37%; height:6px;
  background: linear-gradient(180deg, #a67c52, #8d6e63, #6d4c41);
  z-index:4; border-radius:3px;
  box-shadow: 0 2px 6px rgba(0,0,0,.15);
}

.curtain-label {
  position:absolute; top:51%; left:8%; font-size:clamp(7px,1.1vw,11px);
  color:var(--text-mid); font-weight:600; z-index:3; opacity:.8;
}

/* ===== SOFA ===== */
.sofa { position:absolute; bottom:16%; left:6%; width:34%; height:22%; z-index:4; }
.sofa-back {
  position:absolute; top:0; left:4%; right:4%; height:48%;
  background: linear-gradient(180deg, #5d4037, #4e342e);
  border-radius:14px 14px 0 0;
}
.sofa-seat {
  position:absolute; bottom:0; left:0; right:0; height:56%;
  background: linear-gradient(180deg, #6d4c41, #5d4037);
  border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.sofa-arm-l, .sofa-arm-r {
  position:absolute; bottom:0; width:8%; height:80%;
  background:linear-gradient(180deg, #5d4037, #4e342e);
  border-radius:8px;
}
.sofa-arm-l { left:-2%; }
.sofa-arm-r { right:-2%; }

.sofa-pillow {
  position:absolute; top:12%; width:22%; height:55%; border-radius:10px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,.12), 0 2px 4px rgba(0,0,0,.08);
}
.sofa-pillow:nth-child(4) { left:8%; background:linear-gradient(135deg,#8d6e63,#a1887f); }
.sofa-pillow:nth-child(5) { left:34%; background:linear-gradient(135deg,#a1887f,#bcaaa4); }
.sofa-pillow:nth-child(6) { left:62%; background:linear-gradient(135deg,#8d6e63,#a1887f); }

/* Throw pillow */
.throw-pillow {
  position:absolute; top:5%; left:72%; width:18%; height:42%;
  background: linear-gradient(135deg, #ffcc80, #ffb74d);
  border-radius:8px; transform:rotate(-12deg); z-index:1;
  box-shadow: 0 2px 6px rgba(0,0,0,.1);
}

/* ===== COFFEE TABLE ===== */
.coffee-table {
  position:absolute; bottom:10%; left:20%; width:18%; height:7.5%;
  background: linear-gradient(180deg, #bcaaa4, #a1887f);
  border-radius:5px; z-index:5;
  box-shadow: 0 6px 16px rgba(0,0,0,.12);
}
.coffee-table::before {
  content:''; position:absolute; bottom:-6px; left:8%; width:12%; height:6px;
  background:#8d6e63; border-radius:0 0 3px 3px;
}
.coffee-table::after {
  content:''; position:absolute; bottom:-6px; right:8%; width:12%; height:6px;
  background:#8d6e63; border-radius:0 0 3px 3px;
}

/* ===== NIGHTSTAND ===== */
.nightstand {
  position:absolute; bottom:6%; right:4%; width:13%; height:16%;
  background: linear-gradient(180deg, #8d6e63, #795548);
  border-radius:6px; z-index:5; box-shadow:0 6px 16px rgba(0,0,0,.12);
}
.nightstand::before {
  content:''; position:absolute; top:40%; left:30%; width:40%; height:3px;
  background:rgba(0,0,0,.08); border-radius:2px;
}

/* ===== BOOKSHELF (decoration) ===== */
.bookshelf {
  position:absolute; top:6%; left:38%; width:14%; height:44%; z-index:2;
}
.shelf { position:absolute; left:0; right:0; height:4px; background:#6d4c41; border-radius:2px; }
.shelf:nth-child(1){top:0;}
.shelf:nth-child(2){top:33%;}
.shelf:nth-child(3){top:66%;}
.shelf:nth-child(4){top:99%;}
.books {
  position:absolute; left:4%; bottom:4px; display:flex; gap:2px;
}
.book {
  width:clamp(4px,0.6vw,7px); border-radius:1px 1px 0 0;
  box-shadow: 0 -1px 2px rgba(0,0,0,.1);
}

/* ===== PLANT (decoration) ===== */
.plant-pot {
  position:absolute; bottom:6%; left:46%; width:5%; z-index:6;
}
.pot {
  width:100%; aspect-ratio:1/.7;
  background: linear-gradient(180deg, #a1887f, #8d6e63);
  border-radius:4px 4px 6px 6px; position:relative;
}
.plant-leaves {
  position:absolute; bottom:90%; left:50%; transform:translateX(-50%);
  width:160%; aspect-ratio:1;
}
.leaf {
  position:absolute; width:40%; height:60%;
  background: linear-gradient(135deg, #66bb6a, #43a047);
  border-radius:50% 0 50% 0;
}
.leaf:nth-child(1){ left:10%; bottom:0; transform:rotate(-30deg); }
.leaf:nth-child(2){ right:10%; bottom:0; transform:rotate(30deg); }
.leaf:nth-child(3){ left:30%; bottom:20%; transform:rotate(-10deg); background:linear-gradient(135deg,#81c784,#66bb6a); }

/* ===== SMART SPEAKER ===== */
.device-speaker {
  position:absolute; bottom:18%; left:24%; width:6.5%; z-index:6;
  cursor:pointer; transition:transform .3s;
}
.device-speaker:hover { transform:scale(1.1) translateY(-2px); }

.speaker-body {
  width:100%; aspect-ratio:1/1.2;
  background: linear-gradient(180deg, #37474f, #263238);
  border-radius:30% 30% 40% 40%; position:relative;
  box-shadow: 0 6px 18px rgba(0,0,0,.25);
}
.speaker-ring {
  position:absolute; top:18%; left:18%; right:18%; aspect-ratio:1;
  border-radius:50%; border:2.5px solid #546e7a; opacity:.5;
  transition:all .5s;
}
.speaker-dot {
  position:absolute; top:50%; left:50%; width:6px; height:6px;
  background:#546e7a; border-radius:50%; transform:translate(-50%,-50%);
  transition:all .5s;
}
.speaker-body.active .speaker-ring {
  border-color:var(--accent-teal); opacity:1;
  box-shadow:0 0 18px rgba(0,191,165,.45);
  animation:ringPulse 1.2s ease infinite;
}
.speaker-body.active .speaker-dot {
  background:var(--accent-teal);
  box-shadow:0 0 8px var(--accent-teal);
}
@keyframes ringPulse {
  0%,100%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.08); opacity:.65;}
}

/* Sound waves */
.sound-waves {
  position:absolute; top:-30%; left:50%; transform:translateX(-50%);
  width:200%; height:40%; pointer-events:none; opacity:0; transition:opacity .5s;
}
.sound-waves.active { opacity:1; }
.sw {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  border:2px solid var(--accent-teal); border-radius:50%;
  opacity:0; animation:soundWave 1.8s ease-out infinite;
}
.sw:nth-child(1){ width:40%; aspect-ratio:2/1; animation-delay:0s; }
.sw:nth-child(2){ width:65%; aspect-ratio:2/1; animation-delay:.4s; }
.sw:nth-child(3){ width:90%; aspect-ratio:2/1; animation-delay:.8s; }
@keyframes soundWave {
  0%{opacity:.6;transform:translateX(-50%) scale(.8);}
  100%{opacity:0;transform:translateX(-50%) scale(1.2);}
}

.speaker-label,.lamp-label,.tv-label,.robot-label {
  text-align:center; font-size:clamp(7px,1.1vw,11px);
  color:var(--text-mid); margin-top:4px; font-weight:600; white-space:nowrap;
}

/* ===== DESK LAMP ===== */
.device-lamp {
  position:absolute; bottom:22%; right:5.5%; width:11%; z-index:6;
  cursor:pointer; transition:transform .3s;
}
.device-lamp:hover { transform:scale(1.06); }

.lamp-shade {
  width:70%; aspect-ratio:1.8/1; margin:0 auto;
  background: linear-gradient(180deg, #bdbdbd, #9e9e9e);
  border-radius:50% 50% 5px 5px; position:relative;
  transition:all .6s; box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.lamp-shade.on {
  background: linear-gradient(180deg, #fff9c4, #fff176);
  box-shadow:0 0 30px rgba(255,241,118,.4), 0 2px 8px rgba(0,0,0,.08);
}

.lamp-pole {
  width:5px; height:48px; margin:0 auto;
  background:linear-gradient(180deg, #8d6e63, #6d4c41);
  border-radius:3px;
}
.lamp-base-el {
  width:50%; height:7px; margin:0 auto;
  background:linear-gradient(180deg, #6d4c41, #5d4037);
  border-radius:4px;
}

.lamp-glow {
  position:absolute; bottom:-60px; left:-50%; width:200%; height:100px;
  background:radial-gradient(ellipse at center, rgba(255,241,118,.35) 0%, rgba(255,241,118,.1) 40%, transparent 70%);
  opacity:0; transition:opacity .6s; pointer-events:none;
}
.lamp-glow.on { opacity:1; }

/* Warm particles */
.lamp-particles {
  position:absolute; bottom:-20px; left:0; right:0; height:50px;
  pointer-events:none; overflow:visible;
}
.lp {
  position:absolute; width:3px; height:3px;
  background:rgba(255,241,118,.6); border-radius:50%;
  animation:floatUp 2.5s ease infinite;
}
.lp:nth-child(1){left:20%;animation-delay:0s;}
.lp:nth-child(2){left:40%;animation-delay:.5s;}
.lp:nth-child(3){left:60%;animation-delay:1s;}
.lp:nth-child(4){left:80%;animation-delay:1.5s;}
@keyframes floatUp {
  0%{opacity:0;transform:translateY(0);}
  30%{opacity:.8;}
  100%{opacity:0;transform:translateY(-35px) translateX(5px);}
}
.lamp-particles { display:none; }
.lamp-particles.on { display:block; }

/* ===== TV ===== */
.device-tv {
  position:absolute; top:3%; right:6%; width:34%; z-index:4;
  cursor:pointer; transition:transform .3s;
}
.device-tv:hover { transform:scale(1.03); }

.tv-frame {
  width:100%; aspect-ratio:16/9;
  background:#1a1a1a; border-radius:6px;
  border:5px solid #212121; position:relative; overflow:hidden;
  box-shadow: 0 10px 35px rgba(0,0,0,.2);
}
.tv-screen {
  position:absolute; inset:3px; background:#0a0a0a; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  transition:all .6s; overflow:hidden;
}

/* TV on effects */
.tv-screen.on {
  background: linear-gradient(135deg, #1a237e, #0d47a1 40%, #01579b 70%, #0277bd);
}

/* Scanlines */
.tv-scanlines {
  position:absolute; inset:0; pointer-events:none; opacity:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
  transition:opacity .5s;
}
.tv-screen.on .tv-scanlines { opacity:1; }

/* Screen glare */
.tv-glare {
  position:absolute; top:-20%; right:-20%; width:60%; height:60%;
  background:radial-gradient(ellipse, rgba(255,255,255,.06), transparent 70%);
  pointer-events:none; opacity:0; transition:opacity .5s;
}
.tv-screen.on .tv-glare { opacity:1; }

.tv-content {
  color:#fff; font-size:clamp(10px,1.4vw,15px); text-align:center;
  opacity:0; transition:opacity .5s; z-index:1; line-height:1.4;
}
.tv-screen.on .tv-content { opacity:1; }

/* TV channel switch animation */
.tv-screen.switching {
  animation:tvSwitch .3s ease;
}
@keyframes tvSwitch {
  0%{filter:brightness(1);}
  30%{filter:brightness(3) contrast(2);}
  60%{filter:brightness(.5);}
  100%{filter:brightness(1);}
}

.tv-off-dot {
  width:4px; height:4px; background:#1a1a1a; border-radius:50%;
  transition:all .3s;
}
.tv-screen.on .tv-off-dot { display:none; }

/* TV turn on/off animation */
.tv-screen.turning-on {
  animation:tvOn .5s ease forwards;
}
@keyframes tvOn {
  0%{clip-path:inset(49% 0 49% 0);}
  50%{clip-path:inset(0 20% 0 20%);}
  100%{clip-path:inset(0 0 0 0);}
}
.tv-screen.turning-off {
  animation:tvOff .4s ease forwards;
}
@keyframes tvOff {
  0%{clip-path:inset(0 0 0 0); filter:brightness(1);}
  60%{clip-path:inset(45% 0 45% 0); filter:brightness(2);}
  100%{clip-path:inset(50% 0 50% 0); filter:brightness(0);}
}

.tv-stand-el {
  width:18%; height:10px; margin:0 auto;
  background:linear-gradient(180deg, #333, #212121);
  border-radius:0 0 4px 4px;
}

/* Wall mount illusion */
.tv-mount {
  position:absolute; top:50%; right:22%; width:2%; height:8%;
  background:#5d4037; z-index:3; border-radius:2px;
  transform:translateY(-50%);
}

/* ===== ROBOT VACUUM ===== */
.device-robot {
  position:absolute; bottom:4%; left:52%; width:9%; z-index:8;
  cursor:pointer; transition:all .5s cubic-bezier(.4,0,.2,1);
}
.device-robot:hover { transform:scale(1.1); }

.robot-body {
  width:100%; aspect-ratio:1;
  background:linear-gradient(145deg, #eceff1, #cfd8dc, #b0bec5);
  border-radius:50%; position:relative;
  box-shadow: 0 6px 20px rgba(0,0,0,.18), inset 0 2px 4px rgba(255,255,255,.3);
  transition:all .4s;
}

/* Robot face */
.robot-face {
  position:absolute; top:15%; left:50%; transform:translateX(-50%); width:65%;
}
.robot-eyes { display:flex; justify-content:center; gap:22%; }
.robot-eye {
  width:22%; aspect-ratio:1; background:#455a64; border-radius:50%;
  position:relative; transition:all .4s;
  box-shadow: inset 0 1px 3px rgba(0,0,0,.3);
}
.robot-eye::after {
  content:''; position:absolute; top:15%; left:20%; width:35%; height:35%;
  background:rgba(255,255,255,.7); border-radius:50%;
}
.robot-mouth {
  width:28%; height:3px; background:#455a64; border-radius:2px;
  margin:18% auto 0; transition:all .4s;
}

/* Active robot */
.robot-body.active {
  box-shadow: 0 6px 20px rgba(0,0,0,.18), 0 0 20px rgba(0,191,165,.2);
}
.robot-body.active .robot-eye {
  background:var(--accent-teal);
  box-shadow: 0 0 8px rgba(0,191,165,.5), inset 0 1px 3px rgba(0,0,0,.2);
}
.robot-body.active .robot-mouth {
  width:22%; height:8px; border-radius:0 0 12px 12px; background:var(--accent-teal);
}

/* Robot antenna */
.robot-antenna {
  position:absolute; top:-12%; left:50%; transform:translateX(-50%);
  width:3px; height:14%; background:#78909c;
}
.robot-antenna::after {
  content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%);
  width:7px; height:7px; background:#90a4ae; border-radius:50%;
  transition: all .4s;
}
.robot-body.active .robot-antenna::after {
  background:var(--accent-teal);
  box-shadow:0 0 8px var(--accent-teal);
  animation:antennaBlink 1s infinite;
}
@keyframes antennaBlink {
  0%,100%{opacity:1;} 50%{opacity:.3;}
}

/* Brush bar */
.robot-brush-bar {
  position:absolute; bottom:8%; left:20%; right:20%; height:6px;
  background:#78909c; border-radius:3px; overflow:hidden;
  transition:all .3s;
}
.robot-brush-bar::after {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(90deg, #607d8b 0, #607d8b 3px, #78909c 3px, #78909c 6px);
}
.robot-body.active .robot-brush-bar::after {
  animation:brushSpin .3s linear infinite;
}
@keyframes brushSpin {
  0%{transform:translateX(0);} 100%{transform:translateX(6px);}
}

/* Robot roaming animation */
.device-robot.roaming {
  animation:robotRoam 6s ease-in-out infinite;
}
@keyframes robotRoam {
  0%{transform:translateX(0) translateY(0);}
  15%{transform:translateX(-25px) translateY(-8px);}
  30%{transform:translateX(-50px) translateY(5px);}
  50%{transform:translateX(-30px) translateY(-15px);}
  70%{transform:translateX(10px) translateY(-5px);}
  85%{transform:translateX(20px) translateY(8px);}
  100%{transform:translateX(0) translateY(0);}
}

/* Dust trail */
.dust-trail {
  position:absolute; pointer-events:none; z-index:7;
}
.dust {
  position:absolute; border-radius:50%; pointer-events:none;
  animation:dustPoof 1.2s ease forwards;
}
@keyframes dustPoof {
  0%{opacity:.7;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}
}

/* Charging dock */
.charge-dock {
  position:absolute; bottom:2%; right:20%; width:5%; height:4%;
  background:linear-gradient(180deg, #78909c, #607d8b);
  border-radius:4px 4px 0 0; z-index:5;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.charge-dock::after {
  content:'⚡'; position:absolute; top:20%; left:50%; transform:translateX(-50%);
  font-size:clamp(6px,.9vw,10px);
}

/* ===== FEEDBACK BUBBLE ===== */
.feedback-bubble {
  position:absolute; top:45%; left:50%; transform:translate(-50%,-50%) scale(.9);
  background:rgba(255,255,255,.97); padding:14px 24px; border-radius:18px;
  font-size:clamp(11px,1.3vw,15px); font-weight:600; z-index:20;
  box-shadow:0 10px 40px rgba(0,0,0,.12);
  opacity:0; pointer-events:none;
  transition:all .45s cubic-bezier(.34,1.56,.64,1);
  max-width:80%; text-align:center; line-height:1.5;
}
.feedback-bubble.show {
  opacity:1; transform:translate(-50%,-55%) scale(1);
}
.feedback-bubble.success { border:2px solid var(--success); color:var(--success); }
.feedback-bubble.fail { border:2px solid var(--fail); color:var(--fail); }
.feedback-bubble.info { border:2px solid var(--accent-blue); color:var(--accent-blue); }

/* Thinking dots when processing */
.feedback-bubble .thinking {
  display:inline-flex; gap:4px; margin-left:4px;
}
.feedback-bubble .thinking span {
  width:5px; height:5px; background:currentColor; border-radius:50%;
  animation:thinkDot .8s ease infinite;
}
.feedback-bubble .thinking span:nth-child(2){animation-delay:.15s;}
.feedback-bubble .thinking span:nth-child(3){animation-delay:.3s;}
@keyframes thinkDot {
  0%,80%,100%{transform:scale(.6);opacity:.4;}
  40%{transform:scale(1);opacity:1;}
}

/* ===== ROOM STATUS BAR ===== */
.room-bar {
  display:flex; justify-content:space-around; padding:10px 14px;
  background:var(--bg-panel); border-top:1px solid rgba(0,0,0,.04);
  flex-wrap:wrap; gap:5px;
}
.device-pill {
  display:flex; align-items:center; gap:5px; font-size:.78em;
  color:var(--text-mid); padding:5px 12px; border-radius:20px;
  background:var(--bg-card); cursor:pointer; transition:all .25s;
  border:1px solid transparent;
}
.device-pill:hover { border-color:var(--accent-warm); background:rgba(255,109,58,.04); }
.device-pill .dot {
  width:8px; height:8px; border-radius:50%; transition:all .4s;
}
.device-pill .dot.on { background:var(--success); box-shadow:0 0 6px rgba(46,125,50,.4); }
.device-pill .dot.off { background:#ccc; }

/* ===== RIGHT PANEL ===== */
.right-panel { display:flex; flex-direction:column; gap:10px; }

/* Command input */
.command-section {
  background:var(--bg-card); border-radius:16px; padding:14px;
  box-shadow:var(--shadow-soft);
}
.section-title {
  font-family:'Baloo 2',cursive; font-size:1em; font-weight:700;
  color:var(--accent-warm); margin-bottom:8px;
}
.command-input-wrap { display:flex; gap:8px; }
.command-input {
  flex:1; padding:10px 14px; border:2px solid #e0d5c8;
  border-radius:12px; font-family:inherit; font-size:.92em;
  background:var(--bg-panel); color:var(--text-dark); outline:none;
  transition:border-color .3s, box-shadow .3s;
}
.command-input:focus { border-color:var(--accent-warm); box-shadow:0 0 0 3px rgba(255,109,58,.1); }
.command-input::placeholder { color:var(--text-light); }

.send-btn {
  padding:10px 20px; background:var(--accent-warm); color:#fff; border:none;
  border-radius:12px; font-family:inherit; font-size:.92em; font-weight:700;
  cursor:pointer; transition:all .3s; white-space:nowrap;
  box-shadow:0 3px 12px rgba(255,109,58,.25);
}
.send-btn:hover { background:#f4511e; transform:translateY(-1px); box-shadow:0 5px 18px rgba(255,109,58,.3); }
.send-btn:active { transform:translateY(0); }

/* Voice animation on input */
.voice-wave {
  display:flex; align-items:center; gap:2px; height:20px; margin-top:8px; opacity:0;
  transition:opacity .3s;
}
.voice-wave.active { opacity:1; }
.voice-wave span {
  width:3px; background:var(--accent-warm); border-radius:2px;
  animation:voiceBar .6s ease-in-out infinite alternate;
}
.voice-wave span:nth-child(1){height:6px;animation-delay:0s;}
.voice-wave span:nth-child(2){height:12px;animation-delay:.1s;}
.voice-wave span:nth-child(3){height:8px;animation-delay:.2s;}
.voice-wave span:nth-child(4){height:16px;animation-delay:.15s;}
.voice-wave span:nth-child(5){height:10px;animation-delay:.05s;}
.voice-wave span:nth-child(6){height:14px;animation-delay:.25s;}
.voice-wave span:nth-child(7){height:7px;animation-delay:.18s;}
@keyframes voiceBar {
  0%{transform:scaleY(.4);}100%{transform:scaleY(1.2);}
}

/* Quick commands */
.quick-commands { margin-top:10px; }
.quick-label {
  font-size:.72em; color:var(--text-light); margin-bottom:6px;
  text-transform:uppercase; letter-spacing:1px;
}
.quick-btns { display:flex; flex-wrap:wrap; gap:5px; }
.quick-btn {
  padding:4px 11px; background:var(--bg-panel); border:1px solid #e0d5c8;
  border-radius:18px; font-family:inherit; font-size:.78em;
  color:var(--text-mid); cursor:pointer; transition:all .25s;
}
.quick-btn:hover { background:rgba(255,109,58,.08); border-color:var(--accent-warm); color:var(--accent-warm); }
.quick-btn.fail-demo {
  border-color:rgba(198,40,40,.2); color:rgba(198,40,40,.6);
}
.quick-btn.fail-demo:hover { background:rgba(198,40,40,.05); border-color:var(--fail); color:var(--fail); }

/* History */
.history-section {
  background:var(--bg-card); border-radius:16px; padding:14px;
  box-shadow:var(--shadow-soft); max-height:250px; overflow-y:auto;
}
.history-section::-webkit-scrollbar { width:4px; }
.history-section::-webkit-scrollbar-thumb { background:#d7ccc8; border-radius:2px; }

.history-item {
  display:flex; gap:8px; padding:7px 0;
  border-bottom:1px solid rgba(0,0,0,.03);
  font-size:.82em; animation:slideUp .35s ease;
}
@keyframes slideUp {
  from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);}
}

.history-icon {
  width:22px; height:22px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:.65em; flex-shrink:0; margin-top:2px; font-weight:700;
}
.history-icon.ok { background:rgba(46,125,50,.1); color:var(--success); }
.history-icon.fail { background:rgba(198,40,40,.1); color:var(--fail); }

.history-text { flex:1; }
.history-cmd { font-weight:600; color:var(--text-dark); }
.history-result { color:var(--text-light); font-size:.88em; margin-top:2px; }

/* Score */
.score-section {
  background:var(--bg-card); border-radius:16px; padding:14px;
  box-shadow:var(--shadow-soft);
}
.score-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px;
}
.score-item { text-align:center; }
.score-item .num {
  font-family:'Baloo 2',cursive; font-size:1.4em; font-weight:700;
  color:var(--accent-warm);
}
.score-item .label { font-size:.7em; color:var(--text-light); }

.score-bar { height:8px; background:#efebe9; border-radius:4px; overflow:hidden; margin:6px 0; }
.score-bar-fill {
  height:100%; border-radius:4px; transition:width .6s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg, var(--accent-warm), var(--accent-gold));
}

.rank-badge {
  text-align:center; padding:8px; font-size:.85em; font-weight:600;
  color:var(--accent-warm); border-radius:8px; background:rgba(255,109,58,.06);
  line-height:1.4;
}

/* Challenge */
.challenge-section {
  background:linear-gradient(135deg, #fff8e1, #ffecb3);
  border-radius:16px; padding:14px; box-shadow:var(--shadow-soft);
  border:2px solid var(--accent-gold); display:none;
}
.challenge-section.active { display:block; }
.challenge-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.challenge-title { font-family:'Baloo 2',cursive; font-size:1em; font-weight:700; color:#e65100; }
.challenge-nav {
  display:flex; gap:4px;
}
.challenge-nav button {
  width:26px; height:26px; border-radius:50%; border:1.5px solid #e65100;
  background:transparent; color:#e65100; font-size:.7em; font-weight:700;
  cursor:pointer; transition:all .2s;
}
.challenge-nav button.active { background:#e65100; color:#fff; }
.challenge-nav button.done { background:var(--success); border-color:var(--success); color:#fff; }

.challenge-desc { font-size:.82em; color:#bf360c; margin-bottom:10px; line-height:1.5; }
.challenge-tasks { display:flex; flex-direction:column; gap:3px; }
.challenge-task {
  display:flex; align-items:center; gap:6px; font-size:.82em;
  color:var(--text-mid); padding:4px 0; transition:all .3s;
}
.challenge-task .check-box {
  width:18px; height:18px; border-radius:50%; border:2px solid #d7ccc8;
  display:flex; align-items:center; justify-content:center;
  font-size:.6em; transition:all .4s; flex-shrink:0;
}
.challenge-task.done .check-box {
  background:var(--success); border-color:var(--success); color:#fff;
  animation:checkPop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes checkPop {
  0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}
}
.challenge-task.done { color:var(--success); }
.challenge-task.done span:last-child { text-decoration:line-through; opacity:.6; }

.challenge-complete {
  text-align:center; padding:10px; margin-top:8px;
  background:rgba(46,125,50,.1); border-radius:10px;
  color:var(--success); font-weight:600; font-size:.9em;
  animation:completeBounce .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes completeBounce {
  0%{transform:scale(.5);opacity:0;}
  60%{transform:scale(1.1);}
  100%{transform:scale(1);opacity:1;}
}

/* ===== 移动端适配 ===== */
@media(max-width:960px){
  .main-layout{grid-template-columns:1fr;}
  .right-panel { order: -1; }
  .room-container { order: 1; }
}

@media(max-width:700px){
  .app { padding: 8px 10px 24px; }
  .header { padding: 10px 0 6px; }
  .header h1 { font-size: 1.6em; }

  /* 模式标签 */
  .mode-tabs { gap: 8px; margin: 6px 0 10px; }
  .mode-tab { padding: 7px 18px; font-size: .82em; }

  /* 房间场景保持16:10比例，但缩小内部元素字体 */
  .curtain-label { font-size: 9px; }
  .feedback-bubble { font-size: 12px; padding: 10px 16px; }

  /* 设备状态栏 */
  .room-bar { padding: 7px 10px; gap: 4px; }
  .device-pill { font-size: .72em; padding: 4px 9px; }
  .device-pill .dot { width: 6px; height: 6px; }

  /* 右侧面板 */
  .command-section { padding: 12px; border-radius: 12px; }
  .section-title { font-size: .92em; margin-bottom: 6px; }
  .command-input { padding: 10px 12px; font-size: .88em; min-height: 44px; }
  .send-btn { padding: 10px 16px; font-size: .88em; min-height: 44px; min-width: 64px; }
  .command-input-wrap { gap: 6px; }

  /* 快捷指令按钮 */
  .quick-btn { padding: 5px 12px; font-size: .76em; min-height: 34px; }
  .quick-label { font-size: .68em; }

  /* 历史记录 */
  .history-section { padding: 12px; border-radius: 12px; max-height: 180px; }
  .history-item { font-size: .78em; padding: 5px 0; gap: 6px; }
  .history-icon { width: 20px; height: 20px; }

  /* 积分 */
  .score-section { padding: 12px; border-radius: 12px; }
  .score-grid { gap: 6px; }
  .score-item .num { font-size: 1.2em; }
  .score-item .label { font-size: .65em; }
  .rank-badge { font-size: .8em; padding: 6px; }

  /* 挑战模式 */
  .challenge-section { padding: 12px; border-radius: 12px; }
  .challenge-title { font-size: .92em; }
  .challenge-desc { font-size: .78em; }
  .challenge-task { font-size: .78em; }
  .challenge-nav button { width: 24px; height: 24px; font-size: .65em; }
}

@media(max-width:420px){
  .header h1 { font-size: 1.3em; }
  .mode-tab { padding: 6px 14px; font-size: .78em; }
  .send-btn { padding: 10px 12px; font-size: .82em; }
  .quick-btn { padding: 4px 9px; font-size: .72em; }
  .score-item .num { font-size: 1.1em; }
  .history-section { max-height: 140px; }
  .device-pill { font-size: .67em; padding: 3px 7px; }
}

/* 触摸优化 */
.mode-tab, .quick-btn, .send-btn, .device-pill,
.challenge-nav button, .modal-btn {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.command-input { -webkit-appearance: none; }

   tasks:[

   tasks:[
     {text:'打开台灯',ck:()=>D.lamp.on},

// ===== INIT =====
function init(){
  renderBar(); renderQuickBtns(); updateScore();
}

// ===== COMMAND PROCESSING =====
function sendCommand(){
  const inp=document.getElementById('cmd-input');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  showThinking();
  setTimeout(()=>processCommand(text), 600);
}

function showThinking(){
  const b=document.getElementById('feedback-bubble');
  b.innerHTML='正在识别指令<span class="thinking"><span></span><span></span><span></span></span>';
  b.className='feedback-bubble show info';
}

function processCommand(text){
  stats.total++;

  // 1. Exact / fuzzy match valid commands
  for(const cmd of CMD){
    for(const p of cmd.p){
      if(text===p || fmatch(text,p)){
        executeCmd(cmd);
        showFeedback(cmd.r,'success');
        addHistory(text,cmd.r,true);
        stats.ok++;
        updateScore();
        if(mode==='challenge') setTimeout(renderChallengeCheck,350);
        return;
      }
    }
  }

  // 2. Check unclear patterns
  for(const u of UNCLEAR){
    for(const p of u.p){
      if(text===p || text.includes(p)){
        showFeedback(u.fb,'fail');
        addHistory(text,u.fb,false);
        updateScore();
        return;
      }
    }
  }

  // 3. Keyword decomposition
  const devK={lamp:['灯','台灯'],tv:['电视','电视机'],speaker:['音箱','音响'],robot:['机器人','扫地','打扫','清扫'],curtain:['窗帘','帘子']};
  const actK={on:['打开','开','启动','开始','亮','唤醒'],off:['关闭','关','停止','关掉','停','熄']};

  let fd=null,fa=null;
  for(const[dev,ks]of Object.entries(devK)){if(ks.some(k=>text.includes(k))){fd=dev;break;}}
  for(const[act,ks]of Object.entries(actK)){if(ks.some(k=>text.includes(k))){fa=act;break;}}

  if(fd&&fa){
    let a=fa;
    if(fd==='curtain') a=fa==='on'?'open':'close';
    if(fd==='speaker'&&(text.includes('音乐')||text.includes('歌')))a='play';
    const cmd={d:fd,a,r:getResp(fd,a)};
    executeCmd(cmd);
    showFeedback(cmd.r,'success');
    addHistory(text,cmd.r,true);
    stats.ok++;
    updateScore();
    if(mode==='challenge') setTimeout(renderChallengeCheck,350);
    return;
  }

  if(fd&&!fa){
    const fb=`🤔 你想对${D[fd].name}做什么？请说"打开"或"关闭"+设备名，比如"打开${D[fd].name}"！`;
    showFeedback(fb,'fail'); addHistory(text,fb,false); updateScore(); return;
  }
  if(!fd&&fa){
    const fb=`🤔 要${fa==='on'?'打开':'关闭'}什么设备呢？客厅里有：台灯、电视、音箱、机器人、窗帘。`;
    showFeedback(fb,'fail'); addHistory(text,fb,false); updateScore(); return;
  }

  const fb='❓ 抱歉，我没听懂这条指令。好指令 = 动作 + 设备，比如"打开台灯"或"关闭电视"。';
  showFeedback(fb,'fail'); addHistory(text,fb,false); updateScore();
}

function fmatch(a,b){
  const x=a.replace(/\s/g,''),y=b.replace(/\s/g,'');
  if(x===y||x.includes(y)||y.includes(x))return true;
  if(x.length>=3&&y.length>=3){
    let m=0; for(const c of x){if(y.includes(c))m++;}
    if(m/Math.max(x.length,y.length)>.82)return true;
  }
  return false;
}

function getResp(dev,a){
  const n=D[dev].name;
  if(a==='on'||a==='play'||a==='open') return `好的，${n}已${a==='open'?'打开':a==='play'?'开始播放':'打开'}！`;
  return `好的，${n}已${a==='close'?'关闭':'关闭'}。`;
}

// ===== EXECUTE =====
function executeCmd(cmd){
  if(cmd.d==='all'){
    const on=cmd.a==='on';
    setDev('lamp',on); setDev('tv',on);
    setDev('speaker',on); setDev('robot',on);
    setDev('curtain',on,on?'open':'close');
    return;
  }
  if(cmd.d==='tv'&&cmd.a==='channel'){D.tv.on=true; D.tv.ch=(D.tv.ch%5)+1; animateTVSwitch(); updateTV();renderBar();return;}
  if(cmd.d==='tv'&&cmd.a==='cartoon'){D.tv.on=true; D.tv.ch=2; animateTVSwitch(); updateTV();renderBar();return;}
  if(cmd.d==='tv'&&cmd.a==='news'){D.tv.on=true; D.tv.ch=3; animateTVSwitch(); updateTV();renderBar();return;}
  if(cmd.d==='curtain'){
    setDev('curtain',cmd.a==='open',cmd.a);
  } else {
    setDev(cmd.d,cmd.a==='on'||cmd.a==='play');
  }
}

function setDev(dev,on,extra){
  D[dev].on=on;
  switch(dev){
    case 'lamp': updateLamp(); break;
    case 'tv': on?animateTVOn():animateTVOff(); updateTV(); break;
    case 'speaker': updateSpeaker(); break;
    case 'robot': updateRobot(); break;
    case 'curtain': updateCurtain(); break;
  }
  renderBar();
}

// ===== DEVICE ANIMATIONS =====
function updateLamp(){
  const shade=document.getElementById('lamp-shade');
  const glow=document.getElementById('lamp-glow');
  const parts=document.getElementById('lamp-particles');
  if(D.lamp.on){
    shade.classList.add('on'); glow.classList.add('on'); parts.classList.add('on');
  } else {
    shade.classList.remove('on'); glow.classList.remove('on'); parts.classList.remove('on');
  }
}

function updateTV(){
  const scr=document.getElementById('tv-screen');
  const cnt=document.getElementById('tv-content');
  const chNames=['CCTV-1 综合','📺 动画频道 🧸','📰 新闻频道','🦁 动物世界','🧒 少儿频道'];
  if(D.tv.on){
    scr.classList.add('on');
    cnt.innerHTML=chNames[D.tv.ch-1]+'<br><span style="font-size:.7em;opacity:.6">正在播放中...</span>';
  } else {
    scr.classList.remove('on');
  }
}
function animateTVOn(){
  const scr=document.getElementById('tv-screen');
  scr.classList.remove('turning-off');
  scr.classList.add('turning-on');
  setTimeout(()=>scr.classList.remove('turning-on'),500);
}
function animateTVOff(){
  const scr=document.getElementById('tv-screen');
  scr.classList.remove('turning-on');
  scr.classList.add('turning-off');
  setTimeout(()=>{scr.classList.remove('turning-off');scr.classList.remove('on');},400);
}
function animateTVSwitch(){
  const scr=document.getElementById('tv-screen');
  scr.classList.add('switching');
  setTimeout(()=>scr.classList.remove('switching'),300);
}

function updateSpeaker(){
  const body=document.getElementById('speaker-body');
  const waves=document.getElementById('sound-waves');
  if(D.speaker.on){body.classList.add('active');waves.classList.add('active');}
  else{body.classList.remove('active');waves.classList.remove('active');}
}

function updateRobot(){
  const body=document.getElementById('robot-body');
  const el=document.getElementById('device-robot');
  if(D.robot.on){
    body.classList.add('active'); el.classList.add('roaming');
    startDust();
  } else {
    body.classList.remove('active'); el.classList.remove('roaming');
    if(dustTimer){clearInterval(dustTimer);dustTimer=null;}
  }
}

function startDust(){
  if(dustTimer)clearInterval(dustTimer);
  dustTimer=setInterval(()=>{
    if(!D.robot.on){clearInterval(dustTimer);dustTimer=null;return;}
    const scene=document.getElementById('room-scene');
    const rb=document.getElementById('device-robot');
    const r=rb.getBoundingClientRect(), s=scene.getBoundingClientRect();
    for(let i=0;i<4;i++){
      const d=document.createElement('div');
      d.className='dust';
      const sz=2+Math.random()*4;
      d.style.width=sz+'px'; d.style.height=sz+'px';
      d.style.background=`hsl(30,${20+Math.random()*20}%,${75+Math.random()*15}%)`;
      d.style.left=(r.left-s.left+r.width/2+(Math.random()-.5)*r.width)+'px';
      d.style.top=(r.top-s.top+r.height*.8)+'px';
      d.style.setProperty('--dx',(Math.random()-.5)*40+'px');
      d.style.setProperty('--dy',-(Math.random()*25+8)+'px');
      scene.appendChild(d);
      setTimeout(()=>d.remove(),1200);
    }
  },500);
}

function updateCurtain(){
  const l=document.getElementById('curtain-l');
  const r=document.getElementById('curtain-r');
  const wl=document.getElementById('window-light');
  if(D.curtain.on){
    l.classList.add('open');l.classList.remove('closed');
    r.classList.add('open');r.classList.remove('closed');
    if(wl)wl.style.opacity='1';
  } else {
    l.classList.remove('open');l.classList.add('closed');
    r.classList.remove('open');r.classList.add('closed');
    if(wl)wl.style.opacity='0';
  }
}

function clickDevice(dev){
  const d=D[dev];
  showFeedback(`${d.icon} ${d.name} — ${d.on?'✅ 开启中':'⬜ 已关闭'}`,d.on?'success':'info');
}

// ===== FEEDBACK =====
function showFeedback(text,type){
  const b=document.getElementById('feedback-bubble');
  b.textContent=text;
  b.className=`feedback-bubble show ${type}`;
  clearTimeout(b._timer);
  b._timer=setTimeout(()=>b.classList.remove('show'),3000);
}

// ===== HISTORY =====
function addHistory(cmd,result,ok){
  const list=document.getElementById('history-list');
  const el=document.createElement('div');
  el.className='history-item';
  el.innerHTML=`
    <div class="history-icon ${ok?'ok':'fail'}">${ok?'✓':'✗'}</div>
    <div class="history-text">
      <div class="history-cmd">"${cmd}"</div>
      <div class="history-result">${result}</div>
    </div>`;
  list.insertBefore(el,list.firstChild);
  // keep max 30
  while(list.children.length>30) list.removeChild(list.lastChild);
}

// ===== SCORE =====
function updateScore(){
  document.getElementById('s-total').textContent=stats.total;
  document.getElementById('s-ok').textContent=stats.ok;
  document.getElementById('s-fail').textContent=stats.total-stats.ok;
  const rate=stats.total>0?Math.round(stats.ok/stats.total*100):0;
  document.getElementById('score-fill').style.width=rate+'%';

  let rank;
  if(stats.total===0) rank='🌟 开始下达指令吧！';
  else if(stats.total<3) rank='🌱 初学者 — 继续探索！';
  else if(rate>=90) rank='🏆 智能助手小达人！指令又清晰又准确！';
  else if(rate>=75) rank='⭐ 指令高手！表达越来越清楚了~';
  else if(rate>=60) rank='🔧 进步中！记住：动作 + 设备 = 好指令';
  else if(rate>=40) rank='📖 继续加油！试试更清晰的表达方式~';
  else rank='💪 要多练习哦！好指令 = "打开/关闭" + "设备名"';
  document.getElementById('rank-badge').textContent=rank;
}

// ===== DEVICE BAR =====
function renderBar(){
  const bar=document.getElementById('room-bar');
  bar.innerHTML='';
  for(const[k,d]of Object.entries(D)){
    const p=document.createElement('div');
    p.className='device-pill';
    p.innerHTML=`<div class="dot ${d.on?'on':'off'}"></div><span>${d.icon} ${d.name}</span>`;
    p.onclick=()=>clickDevice(k);
    bar.appendChild(p);
  }
}

// ===== QUICK BUTTONS =====
function renderQuickBtns(){
  const good=document.getElementById('good-btns');
  const bad=document.getElementById('bad-btns');
  const goodList=['打开台灯','关闭电视','播放音乐','开始扫地','关闭窗帘','电视换台','关闭音箱','停止扫地','打开窗帘','调亮台灯'];
  const badList=['弄一下灯','那个','搞一下电视','开','灯','打开空调','帮我弄弄','灯关亮','你好','动一下'];
  good.innerHTML='';
  goodList.forEach(t=>{
    const b=document.createElement('button');
    b.className='quick-btn'; b.textContent=t;
    b.onclick=()=>{document.getElementById('cmd-input').value=t;sendCommand();};
    good.appendChild(b);
  });
  bad.innerHTML='';
  badList.forEach(t=>{
    const b=document.createElement('button');
    b.className='quick-btn fail-demo'; b.textContent=t;
    b.onclick=()=>{document.getElementById('cmd-input').value=t;sendCommand();};
    bad.appendChild(b);
  });
}

// ===== INPUT VOICE WAVE =====
function onInputChange(){
  const v=document.getElementById('voice-wave');
  const inp=document.getElementById('cmd-input');
  if(inp.value.length>0){v.classList.add('active');}
  else{v.classList.remove('active');}
}

// ===== MODE =====
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',i===(m==='free'?0:1)));
  const cs=document.getElementById('challenge-section');
  if(m==='challenge'){cs.classList.add('active'); loadChallenge(0);}
  else{cs.classList.remove('active');}
}

// ===== CHALLENGE =====
function loadChallenge(idx){
  chIdx=idx;
  const ch=CHL[idx];
  ch.init();
  document.getElementById('ch-title').textContent=ch.title;
  document.getElementById('ch-desc').textContent=ch.desc;
  document.getElementById('ch-complete-area').innerHTML='';
  renderChallengeNav();
  renderChallengeCheck();
}

function renderChallengeNav(){
  const nav=document.getElementById('ch-nav');
  nav.innerHTML='';
  CHL.forEach((_,i)=>{
    const b=document.createElement('button');
    b.textContent=i+1;
    b.className=i===chIdx?'active':'';
    if(chDone[i])b.classList.add('done');
    b.onclick=()=>loadChallenge(i);
    nav.appendChild(b);
  });
}

function renderChallengeCheck(){
  const ch=CHL[chIdx];
  const container=document.getElementById('ch-tasks');
  container.innerHTML='';
  let done=0;
  ch.tasks.forEach(t=>{
    const ok=t.ck();
    if(ok)done++;
    const el=document.createElement('div');
    el.className=`challenge-task ${ok?'done':''}`;
    el.innerHTML=`<div class="check-box">${ok?'✓':''}</div><span>${t.text}</span>`;
    container.appendChild(el);
  });

  const area=document.getElementById('ch-complete-area');
  if(done===ch.tasks.length && !chDone[chIdx]){
    chDone[chIdx]=true;
    area.innerHTML='<div class="challenge-complete">🎉 挑战完成！太棒了！</div>';
    renderChallengeNav();
    // auto next
    if(chIdx<CHL.length-1){
      setTimeout(()=>{
        if(confirm('🎉 挑战完成！进入下一个场景挑战？')) loadChallenge(chIdx+1);
      },1000);
    } else if(chDone.every(x=>x)){
      setTimeout(()=>alert('🏆 全部挑战通关！你是真正的智能助手小达人！'),800);
    }
  } else if(!chDone[chIdx]){
    area.innerHTML='';
  }
}

// ===== START =====
init();
